<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마지막 불씨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=Share+Tech+Mono&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   변수 & 리셋
══════════════════════════════════════ */
:root {
  --bg0:    #080a0f;
  --bg1:    #0d1018;
  --bg2:    #141820;
  --bg3:    #0a0c12;
  --gold:   #E8B84B;
  --gold2:  #F5D680;
  --gold-dim: rgba(232,184,75,0.18);
  --온기:   #C4722A;
  --온기2:  #D8894A;
  --불씨:   #E8B84B;
  --균열:   #8C2A2A;
  --균열2:  #B03030;
  --빛:     #F0E6C0;
  --white:  rgba(240,230,192,0.85);
  --dim:    rgba(240,230,192,0.30);
  --dim2:   rgba(240,230,192,0.12);
  --border:   rgba(232,184,75,0.10);
  --border-w: rgba(232,184,75,0.35);
  --border-s: rgba(232,184,75,0.06);
  --mono:  'Share Tech Mono', monospace;
  --sans:  'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
  --cin:   'Cinzel', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:var(--bg0);
  color:var(--white);
  font-family:var(--serif);
  overflow:hidden;
}

/* ══════════════════════════════════════
   전역 레이어
══════════════════════════════════════ */
#snow-cv  { position:fixed; inset:0; pointer-events:none; z-index:1; }
#vignette { position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0; transition:opacity 1.2s; }
#fade     { position:fixed; inset:0; background:var(--bg0); z-index:900; opacity:0; pointer-events:none; transition:opacity .55s; }
#fade.on  { opacity:1; pointer-events:all; }

/* ══════════════════════════════════════
   타이틀 화면
══════════════════════════════════════ */
#title-screen {
  position:fixed; inset:0; z-index:500;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:
    radial-gradient(ellipse 45% 65% at 50% 12%, rgba(232,184,75,.13) 0%, transparent 55%),
    radial-gradient(ellipse 100% 40% at 50% 100%, rgba(8,10,15,1) 0%, transparent 55%),
    linear-gradient(180deg, #04060b 0%, #08090f 50%, #080a0f 100%);
  overflow:hidden;
}
/* 석계단 수평선 질감 */
#title-screen::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 34px,
    rgba(232,184,75,.022) 34px, rgba(232,184,75,.022) 35px
  );
}
/* 탑 빛줄기 */
#title-screen::after {
  content:''; position:absolute;
  top:0; left:50%; transform:translateX(-50%);
  width:3px; height:42%;
  background:linear-gradient(to bottom, rgba(232,184,75,.7), transparent);
  filter:blur(10px);
  pointer-events:none;
}
/* 랜턴 */
.ti-lantern {
  position:absolute; bottom:26%; font-size:28px;
  filter:drop-shadow(0 0 14px rgba(200,130,40,.8));
  animation:lantern-sway 4s ease-in-out infinite;
  z-index:1;
}
.ti-lantern-l { left:calc(50% - 220px); animation-delay:0s; }
.ti-lantern-r { right:calc(50% - 220px); animation-delay:2s; }
@keyframes lantern-sway {
  0%,100%{ transform:rotate(-4deg); filter:drop-shadow(0 0 10px rgba(200,130,40,.6)); }
  50%    { transform:rotate(4deg);  filter:drop-shadow(0 0 22px rgba(240,180,60,1)); }
}
.ti-en   { font-family:var(--cin); font-size:9px; letter-spacing:.65em; color:var(--gold); opacity:.4; margin-bottom:22px; text-transform:uppercase; }
.ti-main { font-family:var(--serif); font-size:54px; font-weight:700; letter-spacing:.15em; text-align:center;
           color:var(--빛);
           text-shadow: 0 0 70px rgba(232,184,75,.45), 0 0 140px rgba(232,184,75,.15), 0 3px 6px rgba(0,0,0,.9);
           margin-bottom:8px; }
.ti-flame { display:inline-block; animation:flk 2s ease-in-out infinite; }
@keyframes flk { 0%,100%{transform:scaleY(1) rotate(-1deg); filter:drop-shadow(0 0 6px rgba(232,184,75,.7));} 50%{transform:scaleY(1.1) rotate(1deg); filter:drop-shadow(0 0 16px rgba(255,220,100,1));} }
.ti-sub  { font-family:var(--cin); font-size:11px; letter-spacing:.5em; color:var(--gold); opacity:.5; margin-bottom:10px; }
.ti-tagline { font-family:var(--serif); font-size:11px; color:var(--dim); letter-spacing:.06em; margin-bottom:50px; font-style:italic; }
.ti-rule { width:100px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin-bottom:50px; opacity:.4; }
.ti-btn {
  font-family:var(--cin); font-size:11px; letter-spacing:.5em;
  background:transparent;
  border-top:1px solid rgba(232,184,75,.45);
  border-bottom:1px solid rgba(232,184,75,.45);
  border-left:none; border-right:none;
  color:var(--빛);
  padding:14px 64px; cursor:pointer; transition:all .5s;
  text-transform:uppercase; position:relative;
}
.ti-btn:hover { color:var(--gold2); border-color:var(--gold); text-shadow:0 0 20px rgba(232,184,75,.6); letter-spacing:.6em; }
.ti-foot { margin-top:36px; font-family:var(--cin); font-size:9px; color:var(--dim); letter-spacing:.4em; opacity:.55; }

/* ══════════════════════════════════════
   엔딩 화면
══════════════════════════════════════ */
#ending-screen {
  position:fixed; inset:0; z-index:600;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  background:
    radial-gradient(ellipse 50% 55% at 50% 25%, rgba(232,184,75,.07) 0%, transparent 60%),
    var(--bg0);
  padding:48px;
}
#ending-screen.on { display:flex; }
.e-badge  { font-family:var(--cin); font-size:10px; letter-spacing:.35em; padding:4px 14px;
            border-radius:2px; margin-bottom:22px; }
.b-true   { border:1px solid rgba(232,184,75,.45); color:var(--gold2); }
.b-good   { border:1px solid rgba(240,230,192,.2); color:var(--dim); }
.b-normal { border:1px solid rgba(160,180,220,.25); color:rgba(180,200,230,.55); }
.b-bad    { border:1px solid rgba(140,42,42,.5); color:var(--균열2); }
.e-title  { font-family:var(--serif); font-size:28px; font-weight:700; text-align:center; line-height:1.6;
            margin-bottom:24px; color:var(--빛); text-shadow:0 0 40px rgba(232,184,75,.2); }
.e-text   { font-family:var(--serif); font-size:13px; line-height:2.5; color:rgba(240,230,192,.42); font-style:italic;
            text-align:center; max-width:520px; margin-bottom:44px; }
.e-btn    { font-family:var(--cin); font-size:11px; letter-spacing:.4em;
            background:transparent;
            border-top:1px solid rgba(232,184,75,.3); border-bottom:1px solid rgba(232,184,75,.3);
            border-left:none; border-right:none;
            color:var(--gold); padding:12px 44px; cursor:pointer; transition:all .4s; text-transform:uppercase; }
.e-btn:hover { color:var(--gold2); border-color:var(--gold); text-shadow:0 0 16px rgba(232,184,75,.5); }

/* ══════════════════════════════════════
   게임 레이아웃 — DARK FAIRYTALE MANUSCRIPT
   좌: 세계(stage 62%) · 우: 석조 고문서 패널(38%)
══════════════════════════════════════ */
#game-wrap {
  position:fixed; inset:0;
  display:none;
  flex-direction:row;
  z-index:10;
}

/* ─── 헤더: 완전 제거 → stage 위 오버레이로 대체 ─── */
#header { display:none; }

/* ─── 씬 정보 오버레이 (stage 위 상단) ─── */
#scene-strip {
  position:absolute; top:22px; left:22px; z-index:30;
  display:flex; flex-direction:column; gap:4px;
  padding:10px 14px;
  background:rgba(8,10,15,.55);
  border-left:1px solid rgba(232,184,75,.25);
  backdrop-filter:blur(4px);
}
.sc-id  { font-family:var(--cin); font-size:8px; letter-spacing:.5em;
          color:var(--gold); opacity:.6; text-transform:uppercase; }
.sc-nm  { font-family:var(--serif); font-size:12px; color:rgba(240,230,192,.55);
          letter-spacing:.04em; }

/* ─── 스탯 카드 3개 (우상단) ─── */
#stat-hud {
  position:absolute; top:18px; right:18px; z-index:30;
  display:flex; flex-direction:row; gap:6px;
}
.stat-card {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 14px;
  background:rgba(8,10,15,.65);
  border:1px solid rgba(232,184,75,.15);
  backdrop-filter:blur(6px);
  min-width:58px;
}
.stat-card-ico {
  font-size:20px;
  transition:filter .8s, font-size .8s;
}
.stat-card-ico.ico-온기 { filter:drop-shadow(0 0 6px rgba(196,114,42,.7)); }
.stat-card-ico.ico-불씨 { filter:drop-shadow(0 0 8px rgba(232,184,75,.7)); animation:flk 2.5s ease-in-out infinite; }
.stat-card-ico.ico-균열 { filter:drop-shadow(0 0 5px rgba(140,42,42,.6)); }
.stat-card-val {
  font-family:var(--cin); font-size:13px; font-weight:700;
  letter-spacing:.06em; transition:color .5s, transform .2s;
}
.stat-card-val.v-온기 { color:var(--온기2); }
.stat-card-val.v-불씨 { color:var(--gold2); }
.stat-card-val.v-균열 { color:var(--균열2); }
.stat-card-lbl {
  font-family:var(--cin); font-size:7px; letter-spacing:.45em;
  color:var(--dim); text-transform:uppercase;
}
.stat-card-val.bump { transform:scale(1.35); }

/* ─── 좌: 세계 스테이지 ─── */
#stage {
  flex: 0 0 62%;
  position: relative;
  overflow: hidden;
  background: var(--bg0);
}
#stage-bg {
  position:absolute; inset:0; z-index:0;
  transition: background 1.8s ease;
}
#scene-img {
  position:absolute; inset:0; z-index:1;
  background-size:cover; background-position:center center;
  opacity:0; transition:opacity 1.2s;
}
/* 우측: 고문서 패널과의 연결 페이드 */
#stage-fade {
  position:absolute; top:0; bottom:0; right:0; width:100px; z-index:4;
  background:linear-gradient(to right, transparent, #0C1018);
  pointer-events:none;
}
/* 하단 페이드 */
#stage-fade-b {
  position:absolute; bottom:0; left:0; right:0; height:80px; z-index:4;
  background:linear-gradient(to bottom, transparent, rgba(12,16,24,.7));
  pointer-events:none;
}
#stage-vignette {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  box-shadow:inset 0 0 120px rgba(4,5,8,.75);
}
#fog {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse 100% 55% at 50% 115%, rgba(4,5,8,.8) 0%, transparent 65%);
}
/* 균열 오버레이: Fracture 높을수록 붉어짐 */
#crack-overlay {
  position:absolute; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(80,15,15,.0) 100%);
  transition:background 1s, opacity 1s;
  opacity:0;
}
/* 이미지 플레이스홀더 */
#img-placeholder {
  position:absolute; inset:0; z-index:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px;
}
.ph-id   { font-family:var(--cin); font-size:10px; letter-spacing:.4em;
           color:var(--gold); opacity:.35;
           border:1px solid rgba(232,184,75,.12); padding:4px 12px; }
.ph-name { font-family:var(--serif); font-size:13px; color:rgba(240,230,192,.2); letter-spacing:.05em; }
.ph-hint { font-family:var(--cin); font-size:8px; color:rgba(240,230,192,.1);
           letter-spacing:.2em; margin-top:4px; text-transform:uppercase; }

/* ─── 우: 석조 고문서 패널 ─── */
#bottom {
  flex: 1 1 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 32px,
      rgba(232,184,75,.018) 32px,
      rgba(232,184,75,.018) 33px
    ),
    linear-gradient(180deg, #07090e 0%, #08090f 100%);
  border-left: 1px solid rgba(232,184,75,.12);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 15;
}
/* 패널 상단 황금빛 광선 흔적 */
#bottom::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right, transparent, rgba(232,184,75,.4), transparent);
  pointer-events:none; z-index:1;
}

/* 패널 상단 — 씬 캡션 (세로선 + 텍스트) */
#panel-caption {
  flex: 0 0 auto;
  padding: 18px 28px 14px;
  border-bottom: 1px solid rgba(232,184,75,.08);
  display:flex; align-items:center; gap:14px;
}
.pc-line { width:1px; height:30px; background:linear-gradient(to bottom, transparent, rgba(232,184,75,.5), transparent); flex-shrink:0; }
.pc-texts { display:flex; flex-direction:column; gap:3px; }
.pc-sid { font-family:var(--cin); font-size:8px; letter-spacing:.55em; color:var(--gold); opacity:.5; text-transform:uppercase; }
.pc-snm { font-family:var(--serif); font-size:12px; color:rgba(240,230,192,.5); letter-spacing:.06em; }

/* 스크립트 스크롤 — 고문서 본문 */
#script-area {
  flex: 1 1 0;
  overflow-y: auto;
  padding: 20px 28px 12px;
}
#script-area::-webkit-scrollbar { width:1px; }
#script-area::-webkit-scrollbar-thumb { background:rgba(255,200,87,.15); }

/* 대사 스타일 — manuscript 감각 */
.stg  { font-size:11px; color:rgba(240,230,192,.22); font-style:italic; line-height:2.0;
        margin:8px 0; padding-left:14px;
        border-left:1px solid rgba(232,184,75,.12); }
.narr { font-family:var(--serif); font-size:12px; color:rgba(240,220,160,.36);
        font-style:italic; line-height:2.3; text-align:left; padding:8px 0; }
.gold-q { color:var(--gold2); opacity:.9; font-style:italic; text-shadow:0 0 20px rgba(232,184,75,.3); }
.dlg  { margin:10px 0; }
.spk  { font-family:var(--cin); font-size:9px; letter-spacing:.3em;
        margin-bottom:4px; display:flex; align-items:center; gap:6px;
        text-transform:uppercase; }
.spk::before { content:''; width:14px; height:1px; display:inline-block;
               background:currentColor; opacity:.35; flex-shrink:0; }
.s-윤    { color:var(--온기2); }
.s-새벽  { color:#90c8e8; }
.s-어머니{ color:var(--gold2); }
.s-형상  { color:rgba(240,220,160,.4); }
.s-호랑이{ color:#A04040; }
.s-상인  { color:#7aA060; }
.speech  { font-family:var(--serif); font-size:14px; line-height:2.15;
           color:rgba(240,230,192,.8); padding-left:20px; }
.speech p{ margin-bottom:3px; }
.inner-v { font-size:11px; color:rgba(232,184,75,.32); font-style:italic;
           text-align:right; padding:3px 0; font-family:var(--serif); }
.warn-t  { font-family:var(--cin); font-size:9px; color:var(--균열2); letter-spacing:.2em;
           text-align:center; padding:6px 0; animation:pw 2.5s infinite; text-transform:uppercase; }
@keyframes pw { 0%,100%{opacity:.3} 50%{opacity:.9} }

/* ─── 선택지 영역 — Stone Tablets ─── */
#choice-area {
  flex: 0 0 auto;
  padding: 12px 24px 20px;
  border-top: 1px solid rgba(232,184,75,.08);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* 선택지 = 돌판 (stone tablet) */
.choice-card {
  background: rgba(232,184,75,.025);
  border: 1px solid rgba(232,184,75,.1);
  border-radius: 0;
  padding: 14px 18px 12px;
  cursor: pointer;
  transition: background .4s, border-color .4s;
  display: flex;
  flex-direction: column;
  gap: 7px;
  position: relative;
  overflow: hidden;
}
/* 왼쪽 온기 선: 호버 시 나타남 */
.choice-card::before {
  content:''; position:absolute; left:0; top:0; width:2px; height:100%;
  background:linear-gradient(to bottom, var(--온기), var(--불씨));
  opacity:0; transition:opacity .4s;
}
.choice-card:hover {
  background:rgba(232,184,75,.06);
  border-color:rgba(232,184,75,.3);
}
.choice-card:hover::before { opacity:1; }
.choice-card:active { transform:scale(.99); }

.cc-key   { font-family:var(--cin); font-size:8px; letter-spacing:.55em;
            color:var(--gold); opacity:.5; text-transform:uppercase; }
.cc-label { font-family:var(--serif); font-size:13px; color:rgba(240,230,192,.75);
            line-height:1.75; }
.cc-effs  { display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
.eff { font-family:var(--mono); font-size:9px; padding:2px 7px; border-radius:1px; border:1px solid; }
.eff-온기-p { color:rgba(255,179,71,.8); border-color:rgba(255,179,71,.2); background:rgba(255,179,71,.05); }
.eff-온기-n { color:rgba(200,100,80,.8); border-color:rgba(200,100,80,.2); background:rgba(200,100,80,.05); }
.eff-불씨-p { color:rgba(255,200,87,.8); border-color:rgba(255,200,87,.2); background:rgba(255,200,87,.05); }
.eff-불씨-n { color:rgba(170,140,50,.8); border-color:rgba(170,140,50,.2); background:rgba(170,140,50,.05); }
.eff-균열-p { color:rgba(180,90,90,.8); border-color:rgba(180,90,90,.2); background:rgba(180,90,90,.05); }
.eff-균열-n { color:rgba(80,160,110,.8); border-color:rgba(80,160,110,.2); background:rgba(80,160,110,.05); }

/* 다음 버튼 */
.next-btn {
  font-family:var(--cin); font-size:10px; letter-spacing:.45em;
  background:transparent;
  border-top:1px solid rgba(232,184,75,.2);
  border-bottom:1px solid rgba(232,184,75,.2);
  border-left:none; border-right:none;
  color:rgba(232,184,75,.55);
  padding:14px; cursor:pointer; transition:all .5s; text-align:center;
  text-transform:uppercase;
}
.next-btn:hover { color:var(--gold2); border-color:rgba(232,184,75,.5); text-shadow:0 0 14px rgba(232,184,75,.4); }

/* ══════════════════════════════════════
   씬별 배경 색상
══════════════════════════════════════ */
.sbg-S0 { background:radial-gradient(ellipse 70% 60% at 40% 60%,#140f06 0%,#07080c 70%); }
.sbg-S1 { background:radial-gradient(ellipse 80% 60% at 30% 40%,#080d1a 0%,#05070d 70%); }
.sbg-S2 { background:radial-gradient(ellipse 80% 60% at 50% 30%,#060c18 0%,#04060e 70%); }
.sbg-S3 { background:radial-gradient(ellipse 60% 50% at 60% 55%,#0c1208 0%,#080a0d 70%); }
.sbg-S4 { background:radial-gradient(ellipse 70% 60% at 50% 55%,#160e04 0%,#09080c 80%); }
.sbg-S41{ background:radial-gradient(ellipse 50% 50% at 50% 50%,#150606 0%,#060304 70%); }
.sbg-S5 { background:radial-gradient(ellipse 60% 70% at 50% 30%,#1a1408 0%,#08090e 60%); }
.sbg-S6 { background:radial-gradient(ellipse 80% 80% at 50% 20%,#221c06 0%,#08090e 65%); }
</style>
</head>
<body>

<canvas id="snow-cv"></canvas>
<div id="vignette"></div>
<div id="fade"></div>

<!-- ══ 타이틀 ══ -->
<div id="title-screen">
  <!-- 배경 랜턴들 -->
  <div class="ti-lantern ti-lantern-l">🏮</div>
  <div class="ti-lantern ti-lantern-r">🏮</div>

  <p class="ti-en">A Korean Dark Folktale</p>
  <h1 class="ti-main"><span class="ti-flame">🔥</span> 마지막 불씨</h1>
  <p class="ti-sub">THE LAST EMBER</p>
  <p class="ti-tagline">끝없는 겨울 속, 두 남매는 빛의 탑을 향해 걷는다</p>
  <div class="ti-rule"></div>
  <button class="ti-btn" id="start-btn">시작하다</button>
  <p class="ti-foot">난롯불이 꺼지기 전에</p>
</div>

<!-- ══ 엔딩 ══ -->
<div id="ending-screen">
  <div class="e-rule"></div>
  <div id="e-badge" class="e-badge"></div>

/* ══════════════════════════════════════
   변수 조작
══════════════════════════════════════ */
function addStat(n,v){
  if(n==='온기')  온기=cl(온기+v);
  else if(n==='불씨') 불씨=cl(불씨+v);
  else if(n==='균열'){ 균열=cl(균열+v); updateVignette(); }
  refreshStats(n);
}
function cl(v){return Math.max(0,Math.min(100,v));}

function refreshStats(changed){
  const vals = {온기, 불씨, 균열};
  ['온기','불씨','균열'].forEach(n => {
    const el = document.getElementById('sv-'+n);
    if(!el) return;
    el.textContent = vals[n];
    if(n === changed){ el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),260); }
  });

  /* 불씨 낮으면 아이콘 어둡게 */
  const icoEl = document.querySelector('.ico-불씨');
  if(icoEl){
    icoEl.style.filter = 불씨 < 20
      ? 'drop-shadow(0 0 2px rgba(232,184,75,.15)) grayscale(0.7)'
      : `drop-shadow(0 0 ${5+불씨*0.08}px rgba(232,184,75,${0.4+불씨*0.005}))`;
  }

  /* 타워 실루엣 투명도 */
  const tower = document.getElementById('tower-silhouette');
  if(tower) tower.style.opacity = (0.2 + 불씨*0.006).toFixed(2);
}

function updateVignette(){
  const t=균열/100;
  /* 전역 비네트 (빨간 가장자리) */
  const el=document.getElementById('vignette');
  el.style.opacity=t*0.85;
  el.style.boxShadow=`inset 0 0 ${110*t}px rgba(140,42,42,${t*0.55})`;

  /* 균열 오버레이 */
  const co=document.getElementById('crack-overlay');
  if(co){
    co.style.opacity = t*0.7;
    co.style.background=`radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(120,20,20,${t*0.5}) 100%)`;
  }
}

/* ══════════════════════════════════════
   엔딩 판정
══════════════════════════════════════ */
function getEnding(){
  if(균열>=100) return 'GAMEOVER';
  const s=온기*불씨;
  if(s>=10000) return 'E3';
  if(s>=7000)  return 'E1';

}

/* ══════════════════════════════════════
   렌더
══════════════════════════════════════ */
function render(key){
  const sc=SC[key];
  if(!sc){console.error('없음:',key);return;}
  if(sc.end){showEnding(sc);return;}

  /* isNext 씬: 이 씬의 html을 다음 씬 html 앞에 붙여서 한번에 표시 */
  if(sc.choices.length===1 && sc.choices[0].isNext){
    const nxtKey=typeof sc.choices[0].nxt==='function'?sc.choices[0].nxt():sc.choices[0].nxt;
    const nxt=SC[nxtKey];
    if(nxt && !nxt.end){
      /* 현재(결과) html + 구분선 + 다음(선택지) html 합치기 */
      const mergedHtml=(typeof sc.html==='function'?sc.html():sc.html)
        + '<div style="height:1px;background:rgba(255,255,255,.06);margin:14px 0;"></div>'
        + (typeof nxt.html==='function'?nxt.html():nxt.html);
      /* 다음 씬의 배경/이미지/캡션으로 전환 */
      _renderScene({...nxt, html:mergedHtml});
      return;
    }
    /* 다음이 엔딩인 경우 */
    if(nxt && nxt.end){ showEnding(nxt); return; }
  }

  _renderScene(sc);
}

function _renderScene(sc){
  /* 씬 ID / 이름 */
  document.getElementById('hd-sid').textContent  = sc.sid;
  document.getElementById('hd-snm').textContent  = sc.nm;
  document.getElementById('pc-sid').textContent  = sc.sid;
  document.getElementById('pc-snm').textContent  = sc.nm;

  /* 스테이지 배경 */
  document.getElementById('stage-bg').className = sc.bg||'sbg-S0';

  /* 이미지 슬롯 */
  const img=document.getElementById('scene-img');
  img.style.backgroundImage=`url('${sc.img||''}')`;
  img.style.opacity=sc.img?'0.65':'0';

  /* 플레이스홀더 */
  document.getElementById('ph-id').textContent   = sc.sid;
  document.getElementById('ph-name').textContent = sc.nm;
  document.getElementById('ph-id').nextElementSibling.nextElementSibling.textContent
    = `[ 이미지 삽입 예정 — ${sc.img||sc.sid+'.png'} ]`;

  /* 스크립트 */
  const sa=document.getElementById('script-area');
  sa.innerHTML = typeof sc.html==='function'?sc.html():sc.html;
  sa.scrollTop=0;

  /* 선택지 */
  const ca=document.getElementById('choice-area');
  ca.innerHTML='';
  sc.choices.forEach((ch)=>{
    if(ch.isNext){
      const b=document.createElement('button');
      b.className='next-btn'; b.textContent=ch.lbl||'다음으로 →';
      b.onclick=()=>go(ch);
      ca.appendChild(b);
    } else {
      const d=document.createElement('div');
      d.className='choice-card';
      if(ch.key){const k=document.createElement('div');k.className='cc-key';k.textContent=ch.key;d.appendChild(k);}
      const l=document.createElement('div');l.className='cc-label';l.textContent=ch.lbl;d.appendChild(l);
      if(ch.effs&&ch.effs.length){
        const ef=document.createElement('div');ef.className='cc-effs';
        ch.effs.forEach(([stat,val,dir])=>{
          const t=document.createElement('span');
          t.className=`eff eff-${stat}-${dir}`;
          const ico={온기:'❤',불씨:'🔥',균열:'❄'};
          t.textContent=`${ico[stat]||''} ${stat} ${val}`;
          ef.appendChild(t);
        });
        d.appendChild(ef);
      }
      d.onclick=()=>go(ch);
      ca.appendChild(d);
    }
  });
}

function go(ch){
  if(ch.stats) ch.stats.forEach(([n,v])=>addStat(n,v));
  if(ch.s3b!==undefined) S3B=ch.s3b;
  const nk=typeof ch.nxt==='function'?ch.nxt():ch.nxt;
  fade(nk);
}

function fade(key){
  const f=document.getElementById('fade');
  f.classList.add('on');
  setTimeout(()=>{render(key);setTimeout(()=>f.classList.remove('on'),200);},500);
}

function showEnding(sc){
  document.getElementById('game-wrap').style.display='none';
  const es=document.getElementById('ending-screen');
  document.getElementById('e-badge').textContent=sc.badge;
  document.getElementById('e-badge').className='e-badge b-'+sc.type;
  document.getElementById('e-title').textContent=sc.title;
  document.getElementById('e-text').innerHTML=sc.text.replace(/\n/g,'<br>');
  es.classList.add('on');
}

/* ══════════════════════════════════════
   시작 / 재시작
══════════════════════════════════════ */
function startGame(){
  const f=document.getElementById('fade');
  f.classList.add('on');
  setTimeout(()=>{
    document.getElementById('title-screen').style.display='none';
    document.getElementById('game-wrap').style.display='flex';
    render('S0');
    setTimeout(()=>f.classList.remove('on'),300);
  },600);
}
function restartGame(){
  온기=100;불씨=50;균열=0;S3B=false;
  refreshStats(null);updateVignette();
  document.getElementById('ending-screen').classList.remove('on');
  document.getElementById('game-wrap').style.display='flex';
  render('S0');
}
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',restartGame);

/* 초기 스탯 */
refreshStats(null);

/* ══════════════════════════════════════
   눈 파티클
══════════════════════════════════════ */
(function(){
  const cv=document.getElementById('snow-cv');
  const ctx=cv.getContext('2d');
  function rsz(){cv.width=innerWidth;cv.height=innerHeight;}
  rsz();window.addEventListener('resize',rsz);
  const fl=Array.from({length:160},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.8+.3,
    vy:Math.random()*.55+.15,vx:(Math.random()-.5)*.3,
    o:Math.random()*.28+.05
  }));
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    fl.forEach(f=>{
      ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(210,225,255,${f.o})`;ctx.fill();
      f.y+=f.vy;f.x+=f.vx;
      if(f.y>cv.height){f.y=-4;f.x=Math.random()*cv.width;}
      if(f.x>cv.width)f.x=0;if(f.x<0)f.x=cv.width;
    });
    requestAnimationFrame(loop);
  })();
})();
</script>
