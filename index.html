/* ══════════════════════════════════
   PILGRIMAGE MAP SYSTEM (순례 지도 캔버스 연출)
   - 겨울 대륙 산맥 & 강 묘사 및 진행선 표시
   ══════════════════════════════════ */
(function(){

const MAP_NODES = [
  { id: 'S1', sid: 'S1', name: '집',       icon: '🕯', x: 0.08, desc: '어머니의 마지막 흔적' },
  { id: 'S2', sid: 'S2', name: '눈의 숲',  icon: '🌲', x: 0.25, desc: '도깨비의 추격전' },
  { id: 'S3', sid: 'S3', name: '얼음 마을',icon: '🏮', x: 0.42, desc: '수상한 상인의 계약' },
  { id: 'S4', sid: 'S4', name: '따뜻한 집',icon: '🏠', x: 0.58, desc: '달콤한 동결의 꿈' },
  { id: 'S5', sid: 'S5', name: '빛의 탑',  icon: '🗼', x: 0.75, desc: '아득한 종말의 계단' },
  { id: 'S6', sid: 'S6', name: '마지막 문',icon: '✦',  x: 0.92, desc: '불씨 여정의 끝' }
];

const SCENE_TO_NODE = {
  'S0': 'S1', 'S1': 'S1',
  'S2': 'S2',
  'S3': 'S3',
  'S4': 'S4',
  'S5': 'S5',
  'S6': 'S6'
};

let visitedNodes = new Set();
let currentNodeId = null;
let mapOpen = false;
let mapInitialized = false;
let mapCompassAngle = 0; // 나침반 회전각

function initMap(){
  if(mapInitialized) return;
  mapInitialized = true;
  buildNodes();
  buildProgressDots();
  resizeMapCanvas();
  window.addEventListener('resize', resizeMapCanvas);
  document.getElementById('map-tab').addEventListener('click', toggleMap);

  // 나침반 상시 회전 애니메이션
  setInterval(() => {
    mapCompassAngle += 0.5;
  }, 30);
}

function buildNodes(){
  const container = document.getElementById('map-nodes');
  container.innerHTML = '';
  MAP_NODES.forEach((node, i) => {
    const el = document.createElement('div');
    el.className = 'map-node undiscovered';
    el.id = 'mnode-' + node.id;
    el.style.left = (node.x * 100) + '%';
    el.style.top = '50%';

    el.innerHTML = `
      <div class="node-marker">
        <div class="node-marker-inner">${node.icon}</div>
      </div>
      <div class="node-label">
        <span class="node-sid">${node.sid}</span>
        <span class="node-name">${node.name}</span>
      </div>`;

    el.addEventListener('mouseenter', function(){
      if(!this.classList.contains('undiscovered')){
        showMapTooltip(this, node);
      }
    });
    el.addEventListener('mouseleave', hideMapTooltip);
    container.appendChild(el);
  });
}

function buildProgressDots(){
  const dots = document.getElementById('map-progress-dots');
  dots.innerHTML = '';
  MAP_NODES.forEach(node => {
    const d = document.createElement('div');
    d.className = 'map-dot';
    d.id = 'mdot-' + node.id;
    dots.appendChild(d);
  });
}

window.getCollectedMemoryCount = function(){
  return visitedNodes.size + (currentNodeId ? 1 : 0);
};

window.mapVisitScene = function(sceneKey){
  const nodeId = SCENE_TO_NODE[sceneKey];
  if(!nodeId) return;

  if(!mapInitialized) initMap();

  if(currentNodeId && currentNodeId !== nodeId){
    visitedNodes.add(currentNodeId);
    updateNodeState(currentNodeId, 'visited');
    updateDot(currentNodeId, 'visited');
  }

  const isNew = !visitedNodes.has(nodeId) && currentNodeId !== nodeId;
  currentNodeId = nodeId;

  discoverNode(nodeId, isNew);
  updateNodeState(nodeId, 'current');
  updateDot(nodeId, 'current');

  // 다음 노드를 흐릿하게 예고
  const idx = MAP_NODES.findIndex(n => n.id === nodeId);
  if(idx >= 0 && idx + 1 < MAP_NODES.length){
    const nextNode = MAP_NODES[idx + 1];
    if(!visitedNodes.has(nextNode.id) && nextNode.id !== nodeId){
      discoverNode(nextNode.id, false, true);
    }
  }

  setTimeout(resizeMapCanvas, 150);

  if(isNew){
    flashMapDrawer();
  }
};

function discoverNode(nodeId, animate, unknown){
  const el = document.getElementById('mnode-' + nodeId);
  if(!el) return;
  if(el.classList.contains('discovered') && !unknown) return;

  if(unknown){
    el.classList.remove('undiscovered');
    el.classList.add('unknown');
    el.querySelector('.node-marker-inner').textContent = '?';
    el.querySelector('.node-name').textContent = '???';
  } else {
    el.classList.remove('undiscovered', 'unknown');
    el.classList.add('discovered');
    const node = MAP_NODES.find(n => n.id === nodeId);
    if(node){
      el.querySelector('.node-marker-inner').textContent = node.icon;
      el.querySelector('.node-name').textContent = node.name;
    }
  }
}

function updateNodeState(nodeId, state){
  const el = document.getElementById('mnode-' + nodeId);
  if(!el) return;
  el.classList.remove('visited', 'current', 'unknown');
  el.classList.add(state);
}

function updateDot(nodeId, state){
  const dot = document.getElementById('mdot-' + nodeId);
  if(!dot) return;
  dot.classList.remove('visited', 'current');
  dot.classList.add(state);
}

function resizeMapCanvas(){
  const cv = document.getElementById('map-canvas');
  const body = document.getElementById('map-body');
  const w = body.offsetWidth || 800;
  const h = body.offsetHeight || 172;
  cv.width = w;
  cv.height = h;
  drawMapPaths();
}

/* ─── 순례 지도의 산맥, 탑의 진행도 묘사 캔버스 ─── */
function drawMapPaths(){
  const cv = document.getElementById('map-canvas');
  const ctx = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  if(!w || !h) return;
  ctx.clearRect(0,0,w,h);

  const centerY = h * 0.45;

  // 1) 겨울 대륙의 디테일한 산맥 실루엣 배경 드로잉
  ctx.beginPath();
  ctx.moveTo(0, h * 0.8);
  ctx.quadraticCurveTo(w * 0.2, h * 0.5, w * 0.4, h * 0.75);
  ctx.quadraticCurveTo(w * 0.6, h * 0.48, w * 0.8, h * 0.7);
  ctx.quadraticCurveTo(w * 0.9, h * 0.6, w, h * 0.78);
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(6, 12, 28, 0.45)';
  ctx.fill();

  // 산맥 드로잉 (어두운 서리 필터링)
  ctx.strokeStyle = 'rgba(120, 190, 255, 0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 2) 진행 단계별 "빛의 탑" 가시화 연출
  const currentIdx = MAP_NODES.findIndex(n => n.id === currentNodeId);
  const towerX = MAP_NODES.find(n => n.id === 'S5').x * w;
  
  let towerOpacity = 0.08;
  let towerGlowRadius = 20;
  if(currentIdx >= 5) { towerOpacity = 0.9; towerGlowRadius = 90; }
  else if(currentIdx >= 3) { towerOpacity = 0.45; towerGlowRadius = 50; }
  else if(currentIdx >= 1) { towerOpacity = 0.2; towerGlowRadius = 30; }

  // 탑 실루엣 그리기
  ctx.save();
  ctx.globalAlpha = towerOpacity;
  
  // 탑 뒤에 타오르는 황금빛 광배
  const towerGlow = ctx.createRadialGradient(towerX, centerY - 25, 0, towerX, centerY - 25, towerGlowRadius);
  towerGlow.addColorStop(0, 'rgba(212, 164, 58, 0.45)');
  towerGlow.addColorStop(0.5, 'rgba(180, 120, 30, 0.15)');
  towerGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = towerGlow;
  ctx.beginPath();
  ctx.arc(towerX, centerY - 25, towerGlowRadius, 0, Math.PI*2);
  ctx.fill();

  // 탑의 구체적 외곽
  ctx.fillStyle = 'rgba(212, 164, 58, 0.75)';
  ctx.beginPath();
  ctx.moveTo(towerX, centerY - 50);
  ctx.lineTo(towerX - 8, centerY + 15);
  ctx.lineTo(towerX + 8, centerY + 15);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 3) 전체 점선 경로 그리기
  ctx.beginPath();
  MAP_NODES.forEach((node, i) => {
    const x = node.x * w;
    if(i === 0) ctx.moveTo(x, centerY);
    else ctx.lineTo(x, centerY);
  });
  ctx.strokeStyle = 'rgba(120, 190, 255, 0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 4) 플레이어가 지나온 길의 화려한 아치형 황금 경로 연출
  const visitedCoords = MAP_NODES
    .filter(n => visitedNodes.has(n.id) || n.id === currentNodeId)
    .map(n => ({ x: n.x * w, y: centerY }));

  if(visitedCoords.length >= 2){
    // 광채 레이어
    ctx.beginPath();
    visitedCoords.forEach((pt, i) => {
      if(i === 0) ctx.moveTo(pt.x, pt.y);
      else {
        const prev = visitedCoords[i-1];
        ctx.bezierCurveTo((prev.x + pt.x)/2, prev.y - 12, (prev.x + pt.x)/2, prev.y - 12, pt.x, pt.y);
      }
    });
    ctx.strokeStyle = 'rgba(212, 164, 58, 0.22)';
    ctx.lineWidth = 6;
    ctx.stroke();

    // 황금 핏줄 경로선
    ctx.beginPath();
    visitedCoords.forEach((pt, i) => {
      if(i === 0) ctx.moveTo(pt.x, pt.y);
      else {
        const prev = visitedCoords[i-1];
        ctx.bezierCurveTo((prev.x + pt.x)/2, prev.y - 12, (prev.x + pt.x)/2, prev.y - 12, pt.x, pt.y);
      }
    });
    ctx.strokeStyle = 'rgba(212, 164, 58, 0.75)';
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }

  // 5) 좌측 회전하는 나침반 데코 렌더링
  ctx.save();
  ctx.translate(60, h - 50);
  ctx.rotate(mapCompassAngle * Math.PI / 180);
  
  ctx.strokeStyle = 'rgba(120, 190, 255, 0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI*2);
  ctx.stroke();

  // 바늘
  ctx.fillStyle = 'rgba(212, 164, 58, 0.6)';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(5, 0);
  ctx.lineTo(-5, 0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(120, 190, 255, 0.3)';
  ctx.beginPath();
  ctx.moveTo(0, 18);
  ctx.lineTo(4, 0);
  ctx.lineTo(-4, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 6) 우측 하단 기억의 조각 입자 시뮬레이션
  drawMemoryShardParticles(ctx, w, h);
}

function drawMemoryShardParticles(ctx, w, h){
  const shardCount = visitedNodes.size + (currentNodeId ? 1 : 0);
  const time = performance.now() * 0.0015;
  const baseCenterX = w - 80;
  const baseCenterY = h - 50;

  // 조각 개수만큼 다이아몬드 파편을 공전시킴
  for(let i = 0; i < shardCount; i++){
    const angle = (i * (Math.PI * 2 / 8)) + time * 0.5;
    const px = baseCenterX + Math.cos(angle) * 26;
    const py = baseCenterY + Math.sin(angle) * 16;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(time + i);

    // 파편 다이아몬드
    ctx.fillStyle = 'rgba(212, 164, 58, 0.85)';
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(3.5, 0);
    ctx.lineTo(0, 5);
    ctx.lineTo(-3.5, 0);
    ctx.closePath();
    ctx.fill();

    // 잔광 효과
    ctx.strokeStyle = 'rgba(255, 230, 120, 0.35)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  // 기억 수집 용기 데코
  ctx.strokeStyle = 'rgba(212, 164, 58, 0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(baseCenterX, baseCenterY, 32, 0, Math.PI*2);
  ctx.stroke();
}

function toggleMap(){
  const drawer = document.getElementById('map-drawer');
  mapOpen = !mapOpen;
  drawer.classList.toggle('open', mapOpen);
  if(mapOpen){
    setTimeout(resizeMapCanvas, 650);
  }
}

function flashMapDrawer(){
  const drawer = document.getElementById('map-drawer');
  const tab = document.getElementById('map-tab');
  tab.style.transition = 'background 0.3s ease';
  tab.style.background = 'rgba(212, 164, 58, 0.15)';
  setTimeout(() => {
    tab.style.background = '';
    if(!mapOpen){
      drawer.classList.add('open');
      setTimeout(() => {
        resizeMapCanvas();
        setTimeout(() => {
          // 3초 후 닫힘 연동 제거하여 사용자가 지도를 자유롭게 감상할 수 있도록 유도
        }, 3000);
      }, 650);
    }
  }, 400);
}

let tooltipEl = null;
function showMapTooltip(anchorEl, node){
  hideMapTooltip();
  tooltipEl = document.createElement('div');
  tooltipEl.style.cssText = `
    position:fixed; z-index:200;
    background: rgba(3, 8, 22, 0.96);
    border: 1px solid rgba(212, 164, 58, 0.35);
    padding: 10px 16px; border-radius: 4px; pointer-events: none;
    backdrop-filter: blur(15px);
    box-shadow: 0 5px 25px rgba(0,0,0,0.7);
  `;
  tooltipEl.innerHTML = `
    <div style="font-family:var(--font-sans); font-size:7px; letter-spacing:0.3em; color:var(--gold-core); text-transform:uppercase; margin-bottom:4px">${node.sid}</div>
    <div style="font-family:var(--font-serif); font-size:12px; color:#fff; font-weight:700; letter-spacing:0.04em">${node.name}</div>
    <div style="font-family:var(--font-serif); font-size:10px; color:rgba(220, 235, 255, 0.6); font-style:italic; margin-top:4px">${node.desc}</div>
  `;
  document.body.appendChild(tooltipEl);
  const r = anchorEl.getBoundingClientRect();
  tooltipEl.style.left = (r.left + r.width / 2 - tooltipEl.offsetWidth / 2) + 'px';
  tooltipEl.style.top = (r.top - tooltipEl.offsetHeight - 10) + 'px';
}

function hideMapTooltip(){
  if(tooltipEl){ tooltipEl.remove(); tooltipEl = null; }
}

window.mapInit = initMap;
window.mapToggle = toggleMap;
window.mapInitialized_reset = function(){
  visitedNodes.clear();
  currentNodeId = null;
  mapOpen = false;
  mapInitialized = false;
  document.getElementById('map-drawer').classList.remove('open');
  initMap();
};

})();

/* ══════════════════════════════════
   EMBER RITUAL & PARCHMENT MAP REVEAL
   - S0 종료 시 불씨 터치 의식 및 지도 각성 세션
   ══════════════════════════════════ */
(function(){
  let cv = null;
  let ctx = null;
  let t = 0;

  window._ritualState = { emberIntensity: 0, exploding: false, explodeProgress: 0, clickable: false, active: false };

  function drawRitualEmber(time){
    if(!cv) {
      cv = document.getElementById('ritual-ember-cv');
      if(cv) {
        ctx = cv.getContext('2d');
        cv.width = 120; cv.height = 120;
      }
    }
    if(!cv || !ctx) return;
    
    ctx.clearRect(0,0,120,120);
    const cx = 60, cy = 60;
    const pulse = (Math.sin(time * 2.2) + 1) / 2;
    const intensity = window._ritualState.emberIntensity;

    if(window._ritualState.exploding){
      const ep = window._ritualState.explodeProgress;
      const burst = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(0.01, 60 * ep));
      burst.addColorStop(0, `rgba(255, 240, 180, ${1 - ep})`);
      burst.addColorStop(0.3, `rgba(255, 150, 40, ${(1 - ep) * 0.75})`);
      burst.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = burst;
      ctx.fillRect(0,0,120,120);
      return;
    }

    // 외곽 아우라 맥동
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40 + intensity * 15);
    glow.addColorStop(0, `rgba(240, 130, 30, ${0.28 + pulse * 0.12 + intensity * 0.4})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,120,120);

    // 내부 다이아몬드 황금 핵
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 0.4);
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8 + pulse * 4);
    coreGrad.addColorStop(0, '#fff');
    coreGrad.addColorStop(0.5, '#ECC96A');
    coreGrad.addColorStop(1, 'rgba(212, 164, 58, 0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.moveTo(0, -10 - pulse * 3);
    ctx.lineTo(7 + pulse * 2, 0);
    ctx.lineTo(0, 10 + pulse * 3);
    ctx.lineTo(-7 - pulse * 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function ritualLoop(){
    t += 0.016;
    if(!window._ritualState.exploding) window._ritualState.emberIntensity *= 0.96;
    drawRitualEmber(t);
    if(window._ritualState.active) requestAnimationFrame(ritualLoop);
  }

  window._startRitualLoop = function(){
    window._ritualState.active = true;
    ritualLoop();
  };
  window._stopRitualLoop = function(){
    window._ritualState.active = false;
  };
})();

function startEmberOverlayRitual(onComplete){
  const ritual = document.getElementById('ember-ritual');
  const dark = document.getElementById('ritual-dark');
  const hint = document.getElementById('ritual-hint');
  const cv = document.getElementById('ritual-ember-cv');

  ritual.classList.add('active');
  window._ritualState.active = true;
  window._ritualState.clickable = false;
  window._ritualState.exploding = false;
  window._startRitualLoop();

  // 1단계: 암전
  requestAnimationFrame(() => { dark.classList.add('on'); });

  // 2단계: 작은 고아 불씨 노출 (딜레이 2.5초)
  setTimeout(() => {
    const r = document.getElementById('ritual-ember');
    if(r){
      r.classList.add('show');
    }
  }, 2500);

  // 3단계: 클릭 활성화 유도 (딜레이 4.5초)
  setTimeout(() => {
    hint.classList.add('show');
    window._ritualState.clickable = true;

    function onRitualClick(){
      const r = document.getElementById('ritual-ember');
      if(r) r.removeEventListener('click', onRitualClick);
      if(cv) cv.removeEventListener('click', onRitualClick);
      hint.classList.remove('show');
      window._ritualState.clickable = false;
      executeRitualExplosion(ritual, dark, onComplete);
    }

    if(cv){
      cv.addEventListener('mouseenter', () => { window._ritualState.emberIntensity = 0.8; });
      cv.addEventListener('mouseleave', () => { window._ritualState.emberIntensity = 0.2; });
      cv.addEventListener('click', onRitualClick);
    }
    const r = document.getElementById('ritual-ember');
    if(r) r.addEventListener('click', onRitualClick);
  }, 4500);
}

function executeRitualExplosion(ritual, dark, onComplete){
  window._ritualState.exploding = true;
  const burst = document.getElementById('ritual-burst');
  const startTime = performance.now();

  function animExplode(now){
    const ep = Math.min((now - startTime) / 700, 1);
    window._ritualState.explodeProgress = ep;

    // 플래시 황금빛 팽창
    dark.style.background = `rgba(${Math.floor(ep * 255)}, ${Math.floor(ep * 220)}, ${Math.floor(ep * 140)}, ${1 - ep * 0.3})`;
    burst.style.background = `radial-gradient(circle at 50% 50%, rgba(255,255,255,${1-ep}) 0%, rgba(212,164,58,${(1-ep)*0.8}) 30%, rgba(240,110,20,${(1-ep)*0.3}) 60%, transparent 80%)`;
    burst.classList.add('on');

    if(ep < 1){
      requestAnimationFrame(animExplode);
    } else {
      setTimeout(() => {
        window._stopRitualLoop();
        burst.style.background = '#fff'; // 순백의 대폭발
        setTimeout(() => {
          ritual.classList.remove('active');
          burst.style.background = '';
          burst.classList.remove('on');
          revealParchmentMapScene(onComplete);
        }, 200);
      }, 250);
    }
  }
  requestAnimationFrame(animExplode);
}

/* ─── 양피지 지도 공개 ─── */
function revealParchmentMapScene(onComplete){
  const overlay = document.getElementById('parchment-overlay');
  const wrap = document.getElementById('parchment-wrap');
  const canvas = document.getElementById('parchment-canvas');
  const dust = document.getElementById('parchment-dust');
  const title = document.getElementById('parchment-title');
  const cont = document.getElementById('parchment-continue');

  overlay.classList.add('active');

  const w = Math.min(720, window.innerWidth * 0.9);
  const h = Math.min(360, window.innerHeight * 0.42);
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  canvas.width = w;
  canvas.height = h;
  dust.width = w;
  dust.height = h;

  // 펼쳐지는 느낌 연출
  wrap.style.transition = 'none';
  wrap.style.transform = 'scaleX(0)';
  wrap.style.opacity = '0';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      wrap.style.transition = 'transform 2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease';
      wrap.style.transform = 'scaleX(1)';
      wrap.style.opacity = '1';
    });
  });

  // 잉크 스케치 애니메이션 전개
  setTimeout(() => {
    inkDrawAnim(canvas, w, h, () => {
      title.classList.add('show');
      window._startDustMapVfx(w, h);
      setTimeout(() => {
        cont.classList.add('show');
        cont.addEventListener('click', function once(){
          cont.removeEventListener('click', once);
          closeParchmentOverlay(overlay, wrap, onComplete);
        });
      }, 1000);
    });
  }, 1800);
}

/* 잉크가 흘러 번지는 느낌의 고풍스러운 드로잉 효과 */
function inkDrawAnim(cv, W, H, onDone){
  const ctx = cv.getContext('2d');
  const startTime = performance.now();
  const dur = 3000;
  const centerY = H * 0.5;

  const nodes = [
    { name: '집', x: 0.1, icon: '🕯' },
    { name: '눈의 숲', x: 0.28, icon: '🌲' },
    { name: '얼음 마을', x: 0.46, icon: '🏮' },
    { name: '따뜻한 집', x: 0.62, icon: '🏠' },
    { name: '빛의 탑', x: 0.78, icon: '🗼' },
    { name: '마지막 문', x: 0.92, icon: '✦' }
  ];

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function renderDraw(now){
    const t = easeOut(Math.min((now - startTime) / dur, 1));
    ctx.clearRect(0,0,W,H);

    // 잉크 번짐 효과 배경 얼룩
    ctx.fillStyle = 'rgba(212, 164, 58, 0.03)';
    ctx.beginPath();
    ctx.arc(W * 0.3, centerY, Math.max(0.01, 80 * t), 0, Math.PI*2);
    ctx.arc(W * 0.7, centerY, Math.max(0.01, 100 * t), 0, Math.PI*2);
    ctx.fill();

    const startX = nodes[0].x * W;
    const endX = nodes[nodes.length-1].x * W;
    const currentX = startX + (endX - startX) * t;

    // 경로선 잉크 번짐 선두
    ctx.beginPath();
    ctx.moveTo(startX, centerY);
    ctx.lineTo(currentX, centerY);
    ctx.strokeStyle = 'rgba(212, 164, 58, 0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 노드 발견 순차적 잉크 피어남
    nodes.forEach((n, i) => {
      const nx = n.x * W;
      const progressThresh = i / nodes.length;
      if(t > progressThresh){
        const scale = Math.min((t - progressThresh) * 6, 1);
        ctx.save();
        ctx.globalAlpha = scale;
        
        ctx.fillStyle = 'rgba(15, 10, 5, 0.9)';
        ctx.strokeStyle = 'rgba(212, 164, 58, 0.6)';
        ctx.lineWidth = 1;
        
        ctx.beginPath();
        ctx.arc(nx, centerY, 11, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();

        ctx.font = '8px sans-serif';
        ctx.fillStyle = '#ECC96A';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.icon, nx, centerY);

        ctx.font = '300 9px "Noto Serif KR"';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(n.name, nx, centerY + 22);
        ctx.restore();
      }
    });

    if(t < 1) requestAnimationFrame(renderDraw);
    else onDone();
  }
  requestAnimationFrame(renderDraw);
}

function closeParchmentOverlay(overlay, wrap, onComplete){
  window._stopDustMapVfx();
  wrap.style.transition = 'transform 0.8s cubic-bezier(0.75, 0, 0.85, 0), opacity 0.6s ease';
  wrap.style.transform = 'scaleX(0)';
  wrap.style.opacity = '0';

  overlay.style.transition = 'background 0.9s ease';
  overlay.style.background = 'rgba(0,0,0,0)';

  setTimeout(() => {
    overlay.classList.remove('active');
    overlay.style.background = '';
    
    // 서랍 스무스하게 튀어나왔다 들어가며 인지
    const drawer = document.getElementById('map-drawer');
    if(drawer){
      drawer.classList.add('open');
      setTimeout(() => { drawer.classList.remove('open'); }, 2600);
    }
    onComplete();
  }, 950);
}

/* ─── 양피지 지도 부유 먼지 이펙트 ─── */
(function(){
  let dustParticles = [];
  let active = false;
  let cv = null;
  let ctx = null;

  function createDust(w, h){
    return Array.from({ length: 40 }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.4 - 0.1,
      r: Math.random() * 1.5 + 0.3,
      life: Math.random() * 0.6 + 0.4,
      maxLife: Math.random() * 0.6 + 0.4
    }));
  }

  function loop(){
    if(!cv) {
      cv = document.getElementById('parchment-dust');
      if(cv) ctx = cv.getContext('2d');
    }
    if(!cv || !ctx || !active) return;
    
    ctx.clearRect(0,0,cv.width,cv.height);

    dustParticles.forEach(p => {
      // 덧셈 연산 오류 수정: p.x += p.vx (p.x += p.x...로 되어 있어 값이 기하급수적으로 폭증하여 뻗는 에러 해결)
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.005;
      if(p.life <= 0){
        p.x = Math.random() * cv.width;
        p.y = cv.height + 5;
        p.life = p.maxLife;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(212, 164, 58, ${(p.life / p.maxLife) * 0.35})`;
      ctx.fill();
    });
    if(active) requestAnimationFrame(loop);
  }

  window._startDustMapVfx = function(w, h){
    active = true;
    dustParticles = createDust(w, h);
    loop();
  };
  window._stopDustMapVfx = function(){
    active = false;
  };
})();

/* ══════════════════════════════════
   TITLE WINDOW BACKGROUND ANIMATION
   - 타이틀 화면의 눈보라 및 탑 렌더러
   ══════════════════════════════════ */
(function(){
  const cv = document.getElementById('title-canvas');
  if(!cv || cv.style.display === 'none') return;
  const ctx = cv.getContext('2d');

  function resize(){
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;

  // 별빛
  const stars = Array.from({ length: 150 }, () => ({
    x: Math.random(), y: Math.random() * 0.65,
    r: Math.random() * 0.7 + 0.2,
    o: Math.random() * 0.5 + 0.05,
    twinkle: Math.random() * Math.PI * 2
  }));

  // 눈송이
  const flakes = Array.from({ length: 120 }, () => ({
    x: Math.random() * 1.5, y: Math.random(),
    vy: Math.random() * 0.001 + 0.0003,
    vx: Math.random() * 0.0008 + 0.0002,
    r: Math.random() * 2.0 + 0.4,
    o: Math.random() * 0.45 + 0.05
  }));

  function drawTowerDecor(w, h, time){
    const tw = w * 0.06;
    const tx = (w - tw) / 2;
    const pulse = (Math.sin(time * 0.6) + 1) / 2;

    // 탑 실루엣
    const tg = ctx.createLinearGradient(tx, 0, tx + tw, 0);
    tg.addColorStop(0, '#03050a');
    tg.addColorStop(0.5, '#0a0d16');
    tg.addColorStop(1, '#03050a');
    ctx.fillStyle = tg;
    ctx.fillRect(tx, h * 0.15, tw, h * 0.7);

    // 하늘로 솟구치는 황금 수직 광선
    const beam = ctx.createLinearGradient(w/2 - 2, 0, w/2 + 2, h * 0.6);
    beam.addColorStop(0, `rgba(212, 164, 58, ${0.45 + pulse * 0.15})`);
    beam.addColorStop(0.4, `rgba(180, 120, 30, ${0.18 + pulse * 0.08})`);
    beam.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = beam;
    ctx.fillRect(w/2 - 3, 0, 6, h * 0.65);

    // 정상 광휘 아우라
    const aura = ctx.createRadialGradient(w/2, h * 0.15, 0, w/2, h * 0.15, w * 0.3);
    aura.addColorStop(0, `rgba(255, 215, 100, ${0.28 + pulse * 0.15})`);
    aura.addColorStop(0.5, `rgba(180, 110, 20, 0.05)`);
    aura.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = aura;
    ctx.fillRect(0, 0, w, h * 0.5);
  }

  function drawFigures(w, h){
    const base = h * 0.82;
    const cx = w * 0.5;
    ctx.fillStyle = '#010307';
    // 윤 실루엣
    ctx.beginPath(); ctx.ellipse(cx - 24, base - 28, 4.5, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx - 24, base - 46, 6.5, 0, Math.PI*2); ctx.fill();
    // 새벽 실루엣
    ctx.beginPath(); ctx.ellipse(cx + 12, base - 22, 3.8, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 12, base - 38, 5.5, 0, Math.PI*2); ctx.fill();
    
    // 맞잡은 손
    ctx.beginPath(); ctx.moveTo(cx - 19, base - 26); ctx.lineTo(cx + 8, base - 20);
    ctx.strokeStyle = '#010307'; ctx.lineWidth = 2.5; ctx.stroke();
  }

  function loop(){
    t += 0.016;
    const w = cv.width, h = cv.height;
    ctx.clearRect(0,0,w,h);

    // 밤하늘
    const bg = ctx.createLinearGradient(0,0,0,h);
    bg.addColorStop(0, '#02050f');
    bg.addColorStop(0.5, '#03081a');
    bg.addColorStop(1, '#010308');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,w,h);

    // 은은한 청색 여명 광휘
    const aurora = ctx.createRadialGradient(w*0.5, 0, 0, w*0.5, h*0.25, w*0.5);
    aurora.addColorStop(0, `rgba(40, 80, 180, ${0.07 + Math.sin(t*0.2)*0.03})`);
    aurora.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = aurora;
    ctx.fillRect(0,0,w,h);

    // 별
    stars.forEach(s => {
      const tw = (Math.sin(t * 0.7 + s.twinkle) + 1) / 2;
      ctx.beginPath();
      ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220, 230, 255, ${s.o * 0.4 + tw * s.o * 0.5})`;
      ctx.fill();
    });

    // 산맥
    ctx.beginPath();
    ctx.moveTo(0, h * 0.68);
    ctx.lineTo(w * 0.15, h * 0.5);
    ctx.lineTo(w * 0.35, h * 0.6);
    ctx.lineTo(w * 0.5, h * 0.44);
    ctx.lineTo(w * 0.65, h * 0.56);
    ctx.lineTo(w * 0.8, h * 0.42);
    ctx.lineTo(w, h * 0.6);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = '#020409';
    ctx.fill();

    drawTowerDecor(w, h, t);
    drawFigures(w, h);

    // 눈 내림
    flakes.forEach(f => {
      f.y += f.vy;
      f.x += f.vx + Math.sin(t * 0.5) * 0.0001;
      if(f.y > 1) { f.y = -0.02; f.x = Math.random() * 1.5; }
      if(f.x > 1.5) f.x = -0.1;

      ctx.beginPath();
      ctx.arc(f.x * w, f.y * h, f.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(215, 235, 255, ${f.o * 0.8})`;
      ctx.fill();
    });

    // 비네트 그림자
    const vign = ctx.createLinearGradient(0, h * 0.8, 0, h);
    vign.addColorStop(0, 'rgba(1, 3, 7, 0)');
    vign.addColorStop(1, '#010307');
    ctx.fillStyle = vign;
    ctx.fillRect(0, h*0.8, w, h*0.2);

    requestAnimationFrame(loop);
  }
  loop();
})();

/* ══════════════════════════════════
   GLOBAL STAGE SNOW PARTICLE SYSTEM
   - 게임 플레이 시 화면과 좌측 영상 공간을 포근하게 덮는 패럴랙스 눈보라
   ══════════════════════════════════ */
(function(){
  const cv = document.getElementById('snow-cv');
  const c = cv.getContext('2d');

  function resize(){
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = Array.from({ length: 280 }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * 2.5 + 0.3,
    vy: Math.random() * 1.5 + 0.4,
    vx: (Math.random() - 0.2) * 1.8, // 오른쪽 바람 편향
    o: Math.random() * 0.35 + 0.05,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.02 + 0.01,
    depth: Math.random() // 원근감 필터용 깊이 값
  }));

  let frame = 0;
  const WIND = 0.8;

  function animate(){
    c.clearRect(0, 0, cv.width, cv.height);
    const density = Math.min(particles.length, snowDensity * 2);
    const active = particles.slice(0, density);

    active.forEach(p => {
      p.wobble += p.wobbleSpeed;
      const wave = Math.sin(frame * 0.004) * 0.5 + Math.sin(frame * 0.008) * 0.2;
      p.y += p.vy;
      p.x += p.vx + WIND + wave + Math.sin(p.wobble) * 0.35;

      if(p.y > cv.height + 10){
        p.y = -10;
        p.x = Math.random() * cv.width * 1.4 - cv.width * 0.2;
      }
      if(p.x > cv.width + 20) p.x = -20;
      if(p.x < -20) p.x = cv.width + 20;

      const alpha = p.depth < 0.4 ? p.o * 1.4 : p.o * 0.7;

      if(p.r > 1.8){
        const grad = c.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2);
        grad.addColorStop(0, `rgba(235, 245, 255, ${alpha})`);
        grad.addColorStop(0.5, `rgba(200, 220, 245, ${alpha * 0.5})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        c.fillStyle = grad;
        c.beginPath();
        c.arc(p.x, p.y, p.r * 2, 0, Math.PI*2);
        c.fill();
      } else {
        c.fillStyle = `rgba(220, 235, 255, ${alpha})`;
        c.beginPath();
        c.arc(p.x, p.y, p.r, 0, Math.PI*2);
        c.fill();
      }
    });

    frame++;
    requestAnimationFrame(animate);
  }
  animate();
})();
