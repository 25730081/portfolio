<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마지막 불씨 — The Last Ember</title>
<!-- 구글 웹 폰트: 고풍스럽고 가독성 높은 Noto Serif KR 및 Outfit 적용 -->
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;500;700&family=Outfit:wght@200;300;400;600&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   기본 디자인 시스템 & 테마 색상 정의 (CSS 변수)
   - 서리(Deep Winter)의 깊은 청색과, 대비되는 황금빛 불씨(Ember Gold)를 조화롭게 믹스
   - HSL 변수를 활용하여 시각적으로 깊고 고급스러운 판타지 무드 연출
   ══════════════════════════════════════ */
:root {
  /* 씬별 동적 테마를 반영하기 위한 변수 */
  --scene-accent:   #7AABCF; /* 서리빛 푸른색 */
  --scene-accent2:  #A8CFEA; /* 밝은 청빙색 */
  --scene-glow:     rgba(80, 140, 200, 0.15);
  --scene-border:   rgba(100, 160, 210, 0.22);
  --scene-panel-bg: rgba(2, 6, 18, 0.85); /* 반투명 다크 글래스 */
  --scene-line:     rgba(80, 130, 190, 0.08);
  --scene-text:     #d8e8f8; /* 높은 가독성을 위한 서리빛 텍스트 */
  --scene-text2:    rgba(180, 210, 245, 0.6); /* 보조 텍스트 */
  --scene-btn-clr:  rgba(120, 190, 255, 0.7);
  --scene-btn-bdr:  rgba(100, 160, 210, 0.3);

  /* 고정 변수 */
  --deep-night:  #02050c; /* 깊고 어두운 겨울 밤색 */
  --space-dark:  #010307;
  --gold-core:   #ECC96A; /* 맥동하는 불씨 코어 */
  --gold-aura:   #D4A43A; /* 타오르는 황금빛 */
  --ember-warm:  #E07840; /* 살아있는 불꽃 주황색 */
  --ember-dark:  #C8622A;
  --ice-frost:   #7AABCF;
  --ice-bright:  #C8E4F8;
  --blood-crack: #A02020; /* 균열 및 위협의 붉은 색 */

  /* 폰트 패밀리 */
  --font-serif:  'Gowun Batang', 'Noto Serif KR', serif;
  --font-sans:   'Outfit', 'Noto Sans KR', sans-serif;
  
  /* 고급 장식 효과 */
  --panel-blur:  blur(25px) saturate(1.7);
  --metal-shine: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 50%, transparent 100%);
}

/* ── 씬 상태별 body 테마 클래스 (자바스크립트에서 토글) ── */
body.pal-winter {
  --scene-accent:   #7AABCF; --scene-accent2:  #A8CFEA;
  --scene-glow:     rgba(70,130,210,0.15); --scene-border:   rgba(100,160,220,0.25);
  --scene-panel-bg: rgba(2, 6, 18, 0.88);
  --scene-text:     #e2effa; --scene-text2:    rgba(160, 195, 235, 0.65);
}
body.pal-ember {
  --scene-accent:   #C49A4A; --scene-accent2:  #E0B860;
  --scene-glow:     rgba(180,130,40,0.18); --scene-border:   rgba(180,130,40,0.28);
  --scene-panel-bg: rgba(6, 4, 1, 0.9);
  --scene-text:     #f4eada; --scene-text2:    rgba(215, 185, 140, 0.65);
}
body.pal-false {
  --scene-accent:   #E0A030; --scene-accent2:  #F5C060;
  --scene-glow:     rgba(220,160,40,0.22); --scene-border:   rgba(220,160,40,0.32);
  --scene-panel-bg: rgba(10, 6, 0, 0.92);
  --scene-text:     #f7ebd2; --scene-text2:    rgba(225, 180, 100, 0.65);
}
body.pal-tower {
  --scene-accent:   #D4A43A; --scene-accent2:  #ECC96A;
  --scene-glow:     rgba(212,164,58,0.25); --scene-border:   rgba(212,164,58,0.38);
  --scene-panel-bg: rgba(5, 4, 2, 0.94);
  --scene-text:     #fbf0d8; --scene-text2:    rgba(230, 195, 120, 0.68);
}
body.pal-dawn {
  --scene-accent:   #FFD060; --scene-accent2:  #FFE898;
  --scene-glow:     rgba(255,210,80,0.3); --scene-border:   rgba(255,210,80,0.45);
  --scene-panel-bg: rgba(8, 4, 0, 0.95);
  --scene-text:     #fff6e5; --scene-text2:    rgba(245, 210, 140, 0.72);
}

/* ── 전역 초기화 ── */
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background-color: var(--space-dark);
  color: var(--scene-text);
  font-family: var(--font-serif);
  overflow: hidden;
  cursor: default;
  user-select: none;
}

/* ── 시스템 레이어 ── */
#snow-cv       { position:fixed; inset:0; pointer-events:none; z-index:2; }
#world-warmth  { position:fixed; inset:0; pointer-events:none; z-index:3; transition:background 3s ease, opacity 3s ease; opacity:0; }
#crack-vfx     { position:fixed; inset:0; pointer-events:none; z-index:4; opacity:0; transition:opacity 1.5s; }
#fade-layer    { position:fixed; inset:0; background:#000; z-index:999; opacity:0; pointer-events:none; transition:opacity 0.7s ease; }
#fade-layer.on { opacity:1; pointer-events:all; }

/* ══════════════════════════════════════
   TITLE SCREEN (타이틀 화면)
   - 아득히 먼 탑의 장엄한 비주얼과 눈보라 연출
   ══════════════════════════════════════ */
#title-screen {
  position:fixed; inset:0; z-index:500;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:12vh; overflow:hidden;
}
#title-canvas { position:absolute; inset:0; z-index:0; }
.ti-content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; }
.ti-sub-en {
  font-family: var(--font-sans); font-size:9px; letter-spacing:0.7em;
  color: var(--scene-accent2); opacity:0.6; text-transform:uppercase; margin-bottom:15px;
  text-shadow: 0 0 15px rgba(120, 190, 255, 0.4);
}
.ti-title {
  font-family: var(--font-serif); font-size:clamp(52px, 8vw, 84px); font-weight:700;
  color: #fff; letter-spacing:0.18em; text-align:center;
  text-shadow:
    0 0 30px rgba(200, 230, 255, 0.6),
    0 0 80px rgba(100, 170, 240, 0.3),
    0 4px 10px rgba(0,0,0,0.9);
  line-height:1.1; margin-bottom:10px;
  animation: title-breathe 4s ease-in-out infinite;
}
@keyframes title-breathe {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.02); filter: brightness(1.15); }
}
.ti-en {
  font-family: var(--font-sans); font-size:11px; letter-spacing:0.55em;
  color: var(--scene-accent2); opacity:0.5; text-transform:uppercase; margin-bottom:32px;
}
.ti-divider {
  width:120px; height:1px;
  background: linear-gradient(to right, transparent, rgba(160, 210, 255, 0.6), transparent);
  margin-bottom:32px;
}
.ti-tagline {
  font-family: var(--font-serif); font-size:13px; color: rgba(210, 230, 255, 0.55);
  letter-spacing:0.12em; font-style:italic; margin-bottom:48px;
  text-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.ti-start {
  font-family: var(--font-sans); font-size:10px; letter-spacing:0.6em;
  color: rgba(200, 235, 255, 0.6); text-transform:uppercase;
  border: 1px solid rgba(160, 220, 255, 0.25); background: rgba(5, 12, 30, 0.4);
  cursor:pointer; padding:18px 64px; border-radius:4px;
  backdrop-filter: blur(8px);
  transition: all 0.5s ease;
  position:relative; overflow:hidden;
}
.ti-start:hover {
  color: #fff; border-color: var(--scene-accent2);
  letter-spacing: 0.7em;
  background: rgba(20, 50, 110, 0.35);
  box-shadow: 0 0 30px rgba(120, 190, 255, 0.3), inset 0 0 15px rgba(255,255,255,0.05);
}

/* ── 엔딩 화면 ── */
#ending-screen {
  position:fixed; inset:0; z-index:600;
  display:none; flex-direction:column; align-items:center; justify-content:center; padding:40px;
  background-color: transparent;
}
#ending-canvas { position:absolute; inset:0; z-index:0; }
#ending-screen.on { display:flex; }
.e-inner {
  position:relative; z-index:10; display:flex; flex-direction:column;
  align-items:center; max-width:620px; text-align:center;
  background: rgba(2, 5, 16, 0.25); border: 1px solid rgba(160, 220, 255, 0.15);
  padding: 50px 40px; border-radius: 6px; backdrop-filter: blur(6px);
}
.e-badge {
  font-family: var(--font-sans); font-size:9px; letter-spacing:0.4em;
  padding:6px 20px; margin-bottom:28px; text-transform:uppercase; border-radius:2px;
}
.b-true   { border:1px solid rgba(255,210,80,0.5); color:#FFE478; background:rgba(212,164,58,0.08); }
.b-good   { border:1px solid rgba(120,190,255,0.45); color:#A8CFEA; background:rgba(120,190,255,0.08); }
.b-normal { border:1px solid rgba(230,230,230,0.2); color:#c8d8ea; background:rgba(255,255,255,0.02); }
.b-bad    { border:1px solid rgba(180,40,40,0.5); color:#e05050; background:rgba(180,40,40,0.08); }
.e-title {
  font-family: var(--font-serif); font-size:32px; font-weight:700;
  color: #fff; line-height:1.5; margin-bottom:24px;
  text-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.e-text {
  font-family: var(--font-serif); font-size:14px; line-height:2.6;
  color: rgba(220, 235, 255, 0.75); margin-bottom:48px;
}
.e-rule {
  width:60px; height:1px;
  background: linear-gradient(to right, transparent, var(--scene-accent), transparent);
  margin-bottom:30px;
}
.e-rule {
  width:60px; height:1px;
  background: linear-gradient(to right, transparent, var(--scene-accent), transparent);
  margin-bottom:30px;
}
.e-btn {
  font-family: var(--font-sans); font-size:10px; letter-spacing:0.45em;
  background: rgba(10, 25, 60, 0.45); border: 1px solid rgba(212,164,58,0.25);
  color: rgba(212,164,58,0.7); padding:16px 44px; cursor:pointer; border-radius:3px;
  transition: all 0.5s; text-transform:uppercase;
}
.e-btn:hover { color: #ffe8aa; border-color: var(--gold-aura); background: rgba(212,164,58,0.15); }

/* ══════════════════════════════════════
   GAME WRAP & LAYOUT
   ══════════════════════════════════════ */
#game-wrap { position:fixed; inset:0; display:none; z-index:10; flex-direction:column; background:#010307; }
#main-area { flex:1; position:relative; overflow:hidden; min-height:0; display:flex; }

/* ══════════════════════════════════════
   TOP HUD BAR
   - AAA급 세련된 판타지 스타일의 메탈릭 리본 바
   ══════════════════════════════════════ */
#hud-bar {
  flex:0 0 56px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 30px; position:relative; z-index:50;
  background: linear-gradient(to bottom, rgba(3, 8, 20, 0.95) 0%, rgba(1, 3, 10, 0.98) 100%);
  border-bottom: 1px solid rgba(160, 220, 255, 0.15);
  box-shadow: 0 4px 25px rgba(0,0,0,0.6);
}
#hud-bar::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(to right, transparent, rgba(160, 210, 255, 0.3), rgba(255,255,255,0.5), rgba(160, 210, 255, 0.3), transparent);
}
#hud-left { display:flex; align-items:center; }
#hud-title {
  font-family: var(--font-serif); font-size:15px; font-weight:700;
  color: #fff; letter-spacing:0.1em;
  text-shadow: 0 0 15px rgba(120,190,255,0.4);
}
#hud-sep {
  width:1px; height:16px; margin:0 20px;
  background: linear-gradient(to bottom, transparent, rgba(160, 220, 255, 0.3), transparent);
}
#hud-scene-wrap { display:flex; flex-direction:column; }
#hud-sid {
  font-family: var(--font-sans); font-size:8px; letter-spacing:0.3em;
  color: var(--scene-accent); opacity:0.8; text-transform:uppercase;
}
#hud-snm {
  font-family: var(--font-serif); font-size:12px; color: rgba(255,255,255,0.7);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px;
}

/* ── HUD 오른쪽: 스탯 시스템 ── */
#hud-stats { display:flex; align-items:center; gap:12px; }
.hud-chip {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; background: rgba(5, 12, 30, 0.65);
  border: 1px solid rgba(120, 190, 255, 0.18); border-radius: 4px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  transition: all 0.5s ease;
}
.hud-chip.pulse {
  animation: chip-shine 0.6s ease;
}
@keyframes chip-shine {
  0% { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 0px var(--scene-accent); }
  50% { border-color: var(--scene-accent2); box-shadow: 0 0 12px var(--scene-accent); }
  100% { border-color: rgba(120, 190, 255, 0.18); box-shadow: none; }
}
.hud-chip-icon {
  font-size:14px; filter: drop-shadow(0 0 6px var(--scene-accent));
}
.hud-chip-body { display:flex; flex-direction:column; gap:2px; }
.hud-chip-label {
  font-family: var(--font-sans); font-size:7px; letter-spacing:0.2em;
  color: var(--scene-accent2); text-transform:uppercase;
}
.hud-chip-bar-wrap { width:50px; height:3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow:hidden; }
.hud-chip-bar { height:100%; transition: width 1s ease; }
.bar-온기 { background: linear-gradient(to right, var(--ember-dark), var(--ember-warm)); }
.bar-불씨 { background: linear-gradient(to right, var(--gold-aura), var(--gold-core)); }
.bar-균열 { background: linear-gradient(to right, #7a1a1a, var(--blood-crack)); }
.hud-chip-val {
  font-family: var(--font-sans); font-size:10px; font-weight:600;
  color: #fff; min-width:24px; text-align:right;
}

/* ── HUD 우측 끝: 기억 조각 수집 상태 ── */
#hud-memory-summary {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; background: rgba(20, 15, 5, 0.45);
  border: 1px solid rgba(212, 164, 58, 0.22); border-radius: 4px;
}
.hud-mem-icon { color: var(--gold-core); font-size:12px; filter: drop-shadow(0 0 5px var(--gold-aura)); }
.hud-mem-val { font-family: var(--font-sans); font-size:10px; color: var(--gold-core); font-weight:600; }
.hud-menu-btn {
  font-size: 16px; color: rgba(255,255,255,0.5); cursor: pointer; margin-left: 8px;
  transition: color 0.3s;
}
.hud-menu-btn:hover { color: #fff; }

/* ══════════════════════════════════════
   LEFT STAGE (시네마틱 영상 영역)
   - 어둡고 깊은 씬을 연출하며, 이미지가 없는 대신
     눈보라 캔버스와 입자 효과가 환상적으로 흩날림
   ══════════════════════════════════════ */
#stage {
  flex: 1; position:relative; overflow:hidden;
  border-radius: 8px; border: 1px solid rgba(160, 220, 255, 0.14);
  margin: 15px 10px 15px 15px;
  background-color: #02050c;
  transition: transform 0.5s ease;
}
#stage-bg { position:absolute; inset:0; z-index:0; transition: background 2.5s ease; }
#scene-art { position:absolute; inset:0; z-index:1; }
#stage-right-fade {
  position:absolute; top:0; right:0; bottom:0; width:160px; z-index:8;
  background: linear-gradient(to right, transparent, rgba(2, 6, 18, 0.3), #010307);
}
#stage-bottom-fade {
  position:absolute; bottom:0; left:0; right:0; height:120px; z-index:8;
  background: linear-gradient(to bottom, transparent, rgba(2, 6, 18, 0.8));
}
#stage-vign {
  position:absolute; inset:0; z-index:7; pointer-events:none;
  box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.95);
}

/* 호랑이 눈 연출 */
#tiger-eyes {
  position:absolute; inset:0; z-index:6; pointer-events:none;
  display:none; align-items:center; justify-content:center;
}
.t-eye {
  width:12px; height:6px; border-radius:50%;
  background: radial-gradient(circle, #FF5000, #9A0000, transparent);
  filter: blur(0.5px);
  box-shadow: 0 0 15px rgba(255, 60, 0, 0.9);
}
.t-eyes-wrap { display:flex; gap:36px; transition: transform 3s ease; }

/* ══════════════════════════════════════
   RIGHT PANEL (스토리 영역)
   - 극도로 세련된 고대비 글래스모피즘
   ══════════════════════════════════════ */
#panel {
  width: 440px; flex-shrink:0;
  background: var(--scene-panel-bg);
  backdrop-filter: var(--panel-blur);
  -webkit-backdrop-filter: var(--panel-blur);
  border-left: 1px solid rgba(160, 220, 255, 0.15);
  border-radius: 8px; margin: 15px 15px 15px 10px;
  display:flex; flex-direction:column; z-index:15;
  box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  transition: background 2.5s ease;
}
#panel-head {
  padding: 20px 24px; border-bottom: 1px solid rgba(160, 220, 255, 0.12);
  display:flex; align-items:center; gap:12px;
}
.ph-rule {
  width:3px; height:22px;
  background: linear-gradient(to bottom, var(--scene-accent), var(--scene-accent2));
  border-radius: 1.5px;
}
.ph-texts { display:flex; flex-direction:column; }
.ph-code {
  font-family: var(--font-sans); font-size:8px; letter-spacing:0.3em;
  color: var(--scene-accent); text-transform:uppercase;
}
.ph-name {
  font-family: var(--font-serif); font-size:13px; color: #fff;
  font-weight:700; letter-spacing:0.04em;
}
#script-area {
  flex:1; overflow-y:auto; padding: 24px; scroll-behavior:smooth;
}
#script-area::-webkit-scrollbar { width:2px; }
#script-area::-webkit-scrollbar-thumb { background: rgba(160, 220, 255, 0.15); }

#choice-area {
  padding: 18px 24px 24px; border-top: 1px solid rgba(160, 220, 255, 0.12);
  display:flex; flex-direction:column; gap:10px;
}

/* ── 스토리 텍스트 연출 스타일 ── */
.stg {
  font-family: var(--font-serif); font-size:12px; line-height:2.2;
  margin-bottom:14px; color: var(--scene-text2);
  padding-left:10px; border-left:1px solid rgba(120, 190, 255, 0.2);
}
.narr {
  font-family: var(--font-serif); font-size:13px; line-height:2.3;
  margin-bottom:14px; color: rgba(220, 235, 255, 0.8);
  font-style: italic;
}
.gold-q {
  color: var(--gold-core); text-shadow: 0 0 10px rgba(212,164,58,0.25);
}
.dlg { margin-bottom:16px; display:flex; gap:12px; }

/* 신비롭게 맥동하는 캐릭터 아바타 (CSS + 캔버스로 처리) */
.char-avatar-container {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  position:relative; display:flex; align-items:center; justify-content:center;
  background: rgba(3, 8, 20, 0.8);
  border: 1px solid rgba(120,190,255,0.25);
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  overflow: hidden;
}
.char-avatar-glow {
  position:absolute; inset:0; border-radius:50%;
  box-shadow: inset 0 0 12px currentColor;
  animation: avatar-breathe 2.5s ease-in-out infinite;
}
@keyframes avatar-breathe {
  0%, 100% { opacity: 0.3; transform: scale(0.95); }
  50% { opacity: 0.75; transform: scale(1.05); }
}
.char-avatar-symbol {
  font-size: 11px; z-index: 2; font-weight: 600;
}

/* 화자별 아바타 색상 커스텀 */
.avatar-윤     { color: var(--ember-warm); }
.avatar-새벽   { color: var(--ice-bright); }
.avatar-어머니 { color: var(--gold-core); }
.avatar-형상   { color: #999; }
.avatar-설호 { color: #a02020; }
.avatar-상인   { color: #6bb070; }

.dlg-body { display:flex; flex-direction:column; flex:1; }
.spk {
  font-family: var(--font-sans); font-size:9px; letter-spacing:0.2em;
  font-weight: 600; margin-bottom:4px; text-transform:uppercase;
}
.speech {
  font-family: var(--font-serif); font-size:13.5px; line-height:2.1;

}
.inner-v {
  font-size:11px; font-style:italic; color: var(--scene-accent);
  margin-bottom:12px; text-align:right;
}
.warn-t {
  font-family: var(--font-sans); font-size:8px; color: var(--blood-crack);
  letter-spacing:0.25em; text-align:center; padding:8px;
  animation: alarm-pulse 2s infinite; text-transform:uppercase;
  text-shadow: 0 0 10px rgba(160, 32, 32, 0.4);
}
@keyframes alarm-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.95; } }

/* ── 선택지 카드 (판타지 룬 스톤 뷰) ── */
.choice-card {
  background: rgba(10, 20, 45, 0.45);
  border: 1px solid rgba(160, 220, 255, 0.15);
  padding: 14px 18px; cursor: pointer; border-radius: 4px;
  display:flex; flex-direction:column; gap:5px;
  position:relative; overflow:hidden;
  transition: all 0.4s ease;
}
.choice-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: linear-gradient(to bottom, var(--scene-accent), var(--scene-accent2));
  opacity:0; transition: opacity 0.4s;
}
.choice-card:hover {
  background: rgba(20, 45, 90, 0.65);
  border-color: var(--scene-accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.choice-card:hover::before { opacity:1; }
.cc-key {
  font-family: var(--font-sans); font-size:8px; letter-spacing:0.25em;
  color: var(--scene-accent2); text-transform:uppercase; opacity:0.6;
}
.cc-label {
  font-family: var(--font-serif); font-size:13px; color: #fff;
  line-height:1.8;
}
.cc-effs { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.eff {
  font-family: var(--font-sans); font-size:8px; padding:2px 8px;
  border-radius: 2px; border: 1px solid; letter-spacing: 0.05em;
}
.eff-온기-p { color:var(--ember-warm); border-color:rgba(224,120,64,0.35); background:rgba(224,120,64,0.06); }
.eff-온기-n { color:#cc6652; border-color:rgba(180,80,60,0.35); background:rgba(180,80,60,0.06); }
.eff-불씨-p { color:var(--gold-core); border-color:rgba(212,164,58,0.35); background:rgba(212,164,58,0.06); }
.eff-불씨-n { color:#b59550; border-color:rgba(160,120,40,0.35); background:rgba(160,120,40,0.06); }
.eff-균열-p { color:#e05252; border-color:rgba(160,60,60,0.35); background:rgba(160,60,60,0.06); }
.eff-균열-n { color:#50b078; border-color:rgba(50,160,100,0.35); background:rgba(50,160,100,0.06); }

.next-btn {
  font-family: var(--font-sans); font-size:10px; letter-spacing:0.4em;
  background: rgba(10, 25, 60, 0.4); border: 1px solid rgba(160, 220, 255, 0.2);
  color: var(--scene-accent2); padding: 15px; cursor: pointer;
  border-radius: 4px; text-align:center; text-transform:uppercase;
  transition: all 0.4s ease;
}
.next-btn:hover {
  background: rgba(20, 50, 110, 0.5);
  border-color: var(--scene-accent2); color: #fff;
  box-shadow: 0 0 15px rgba(120,190,255,0.25);
}

/* ─── PROLOGUE PROGRESS (S0 전용) ─── */
#s0-progress-wrap {
  margin-top:20px; padding-top:16px;
  border-top: 1px solid rgba(160, 220, 255, 0.12);
  display:flex; flex-direction:column; gap:6px;
}
.s0-proceed-label {
  font-family: var(--font-sans); font-size:8px; letter-spacing:0.4em;
  color: var(--scene-accent2); opacity:0.5; text-transform:uppercase;
}
#s0-progress-bar { width:100%; height:2px; background: rgba(255,255,255,0.08); border-radius: 1px; }
#s0-progress-fill {
  width:0%; height:100%;
  background: linear-gradient(to right, var(--scene-accent), var(--scene-accent2));
}

.scene-appear {
  animation: scene-fade-in 1.0s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes scene-fade-in {
  from { opacity:0; transform: translateY(8px); }
  to { opacity:1; transform: translateY(0); }
}

/* ══════════════════════════════════════
   PILGRIMAGE MAP DRAWER (하단 순례 지도 서랍)
   - 겨울 산맥의 대서사적인 분위기를 담은 실제 대륙 지도
   ══════════════════════════════════════ */
#map-drawer {
  flex: 0 0 auto;
  position:relative; z-index:30;
  border-top: 1px solid rgba(160, 220, 255, 0.16);
  background: linear-gradient(to bottom, rgba(2, 5, 16, 0.98) 0%, rgba(1, 2, 6, 1) 100%);
  box-shadow: 0 -4px 30px rgba(0,0,0,0.8);
  height: 48px; /* 닫힘 기본 상태 */
  transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
}
#map-drawer.open {
  height: 220px; /* 열릴 때 디테일한 맵이 드러남 */
}

/* 지도 탭 핸들 */
#map-tab {
  height: 48px; display:flex; align-items:center; justify-content:space-between;
  padding:0 30px; cursor:pointer; user-select:none;
}
.map-tab-left { display:flex; align-items:center; gap:12px; }
.map-tab-icon {
  font-size:12px; color: var(--scene-accent2);
  filter: drop-shadow(0 0 6px var(--scene-accent));
}
.map-tab-title {
  font-family: var(--font-sans); font-size:9px; letter-spacing:0.5em;
  color: rgba(255, 255, 255, 0.6); text-transform:uppercase;
}
.map-tab-progress { display:flex; align-items:center; gap:8px; }
.map-progress-label {
  font-family: var(--font-sans); font-size:8px; letter-spacing:0.25em;
  color: rgba(255, 255, 255, 0.45); text-transform:uppercase;
}
.map-progress-dots { display:flex; gap:6px; align-items:center; }
.map-dot {
  width:6px; height:6px; border-radius:50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.8s ease;
}
.map-dot.visited {
  background: var(--scene-accent); border-color: var(--scene-accent2);
  box-shadow: 0 0 8px var(--scene-accent);
}
.map-dot.current {
  background: var(--gold-core); border-color: #fff;
  box-shadow: 0 0 10px var(--gold-core);
  transform: scale(1.2);
}
.map-tab-chevron {
  font-family: var(--font-sans); font-size:9px; color: rgba(255,255,255,0.3);
  transition: transform 0.6s, color 0.3s;
}
#map-drawer.open .map-tab-chevron { transform: rotate(180deg); color: #fff; }

/* 지도 내부 본체 */
#map-body {
  height: 172px; position:relative; overflow:hidden;
  padding: 10px 30px 20px;
}
#map-canvas {
  position:absolute; inset:0; pointer-events:none; z-index:1;
}
#map-nodes {
  position:relative; height:100%; display:flex; align-items:center; z-index:2;
}

/* 개별 노드 디자인 */
.map-node {
  display:flex; flex-direction:column; align-items:center;
  position:absolute; transform: translateX(-50%) translateY(-30%);
  cursor:default; transition: opacity 0.8s ease;
}
.map-node.undiscovered { opacity:0; pointer-events:none; }
.map-node.discovered {
  opacity:1;
  animation: node-appear 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes node-appear {
  0% { opacity:0; transform: translateX(-50%) translateY(-30%) scale(0.6); }
  100% { opacity:1; transform: translateX(-50%) translateY(-30%) scale(1); }
}

.node-marker {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative; transition: all 0.6s ease;
}
.node-marker-inner {
  width:20px; height:20px; border-radius:50%;
  background: rgba(3, 8, 24, 0.95);
  border: 1px solid rgba(160, 220, 255, 0.25);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; color: rgba(255,255,255,0.4);
  transition: all 0.6s ease; z-index:2;
}

/* 노드 방문/현재 상태 */
.map-node.visited .node-marker-inner {
  background: rgba(10, 25, 60, 0.9); border-color: var(--scene-accent);
  color: var(--scene-accent2); box-shadow: 0 0 10px rgba(120, 190, 255, 0.3);
}
.map-node.current .node-marker-inner {
  background: rgba(50, 35, 10, 0.95); border-color: var(--gold-core);
  color: #fff; font-weight:600;
  box-shadow: 0 0 15px var(--gold-aura), inset 0 0 8px rgba(212,164,58,0.3);
  animation: marker-glow-breath 3.5s infinite;
}
@keyframes marker-glow-breath { 0%, 100% { box-shadow: 0 0 12px var(--gold-aura); } 50% { box-shadow: 0 0 24px #fff; } }

/* 현재 노드 링 펄스 연출 */
.node-marker::before {
  content:''; position:absolute; inset:-5px; border-radius:50%;
  border: 1px solid transparent; transition: all 0.6s;
}
.map-node.current .node-marker::before {
  border-color: rgba(212, 164, 58, 0.35);
  animation: ring-ripple 2.2s infinite ease-out;
}
@keyframes ring-ripple {
  0% { transform: scale(0.9); opacity: 0.9; }
  100% { transform: scale(1.4); opacity: 0; }
}

.node-label { margin-top:8px; display:flex; flex-direction:column; align-items:center; gap:2px; }
.node-sid {
  font-family: var(--font-sans); font-size:7px; letter-spacing:0.25em;
  color: rgba(255,255,255,0.3); text-transform:uppercase;
}
.node-name {
  font-family: var(--font-serif); font-size:10.5px;
  color: rgba(220,235,255,0.55); letter-spacing:0.04em;
  text-align:center;
}
.map-node.visited .node-sid { color: var(--scene-accent); }
.map-node.visited .node-name { color: #fff; }
.map-node.current .node-sid { color: var(--gold-core); }
.map-node.current .node-name { color: #fff; font-weight:700; text-shadow:0 0 8px rgba(255,220,100,0.3); }

/* 미발견 노드 */
.map-node.unknown .node-marker-inner {
  color: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.06);
}
.map-node.unknown .node-name { color: rgba(255,255,255,0.2); font-style:italic; }

/* 지도 타이틀 플로팅 (열릴 때만 노출) */
#map-title-tag {
  position:absolute; left:30px; top:12px; z-index:20;
  display:flex; flex-direction:column; gap:2px; opacity:0;
  transition: opacity 0.8s ease;
}
#map-drawer.open #map-title-tag { opacity:1; }
.mtt-en { font-family: var(--font-sans); font-size:7px; letter-spacing:0.4em; color: rgba(255,255,255,0.3); text-transform:uppercase; }
.mtt-kr { font-family: var(--font-serif); font-size:11px; color: rgba(255,255,255,0.6); }

/* 맵 좌우 비네팅 페이드 */
#map-body::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:10;
  background: linear-gradient(to right, #020510 0%, transparent 10%, transparent 90%, #020510 100%);
}

/* ══════════════════════════════════════
   EMBER RITUAL (S0 종료 시 불씨 의식)
   - 극강의 몰입감을 이끌어내는 클릭 폭발 연출
   ══════════════════════════════════════ */
#ember-ritual {
  position:fixed; inset:0; z-index:800;
  display:none; align-items:center; justify-content:center;
  background:#000; pointer-events:none;
}
#ember-ritual.active { display:flex; pointer-events:all; }
#ritual-dark {
  position:absolute; inset:0; background:#000;
  opacity:0; transition: opacity 2.5s ease; pointer-events:none; z-index:1;
}
#ritual-dark.on { opacity:1; }
#ritual-ember {
  position:relative; z-index:10; width:120px; height:120px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; transition: opacity 2.0s ease;
}
#ritual-ember.show { opacity:1; }
#ritual-ember-cv { position:absolute; inset:0; border-radius:50%; }
#ritual-hint {
  position:absolute; bottom:calc(50% - 90px); left:50%; transform:translateX(-50%);
  z-index:10; font-family: var(--font-serif); font-size:12px;
  color: rgba(255, 230, 180, 0); letter-spacing:0.35em; text-align:center;
  white-space:nowrap; transition: color 2.5s ease; font-style:italic;
  text-shadow: 0 0 15px rgba(212,164,58,0.7); pointer-events:none;
}
#ritual-hint.show { color: rgba(255, 220, 160, 0.7); animation: hint-fade 2.5s ease-in-out infinite; }
@keyframes hint-fade { 0%, 100% { opacity:0.4; } 50% { opacity:0.95; } }
#ritual-burst {
  position:absolute; inset:0; z-index:20;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 0%, transparent 60%);
  opacity:0; pointer-events:none; transition: opacity 0.15s ease;
}
#ritual-burst.on { opacity:1; }

/* ══════════════════════════════════════
   PARCHMENT MAP REVEAL (양피지 지도 각성)
   ══════════════════════════════════════ */
#parchment-overlay {
  position:fixed; inset:0; z-index:810;
  display:none; align-items:center; justify-content:center;
  background: rgba(0,0,0,0.97); pointer-events:none;
}
#parchment-overlay.active { display:flex; pointer-events:all; }
#parchment-wrap {
  position:relative; width:min(720px, 90vw); height:min(360px, 42vh);
  overflow:hidden; transform: scaleX(0); opacity:0;
  transform-origin: center center;
}
#parchment-bg {
  position:absolute; inset:0; border-radius:4px;
  background:
    radial-gradient(ellipse 80% 60% at 30% 40%, rgba(160, 120, 45, 0.08) 0%, transparent 60%),
    linear-gradient(160deg, #090a10 0%, #03050c 50%, #010206 100%);
  border: 1px solid rgba(212, 164, 58, 0.25);
  box-shadow:
    0 0 100px rgba(0,0,0,0.95),
    inset 0 0 60px rgba(0,0,0,0.6);
}
#parchment-canvas { position:absolute; inset:0; border-radius:4px; z-index:5; }
#parchment-dust { position:absolute; inset:0; border-radius:4px; z-index:6; pointer-events:none; }
.parchment-edge { position:absolute; top:0; bottom:0; width:22px; z-index:8; pointer-events:none; }
.parchment-edge-l { left:0; background: linear-gradient(to right, rgba(0,0,0,0.7), transparent); }
.parchment-edge-r { right:0; background: linear-gradient(to left, rgba(0,0,0,0.7), transparent); }
#parchment-title {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  z-index:10; text-align:center; pointer-events:none;
  opacity:0; transition: opacity 1.8s ease;
}
#parchment-title.show { opacity:1; }
.pt-en { font-family: var(--font-sans); font-size:8px; letter-spacing:0.8em; color: rgba(212, 164, 58, 0.45); text-transform:uppercase; display:block; margin-bottom:4px; }
.pt-kr { font-family: var(--font-serif); font-size:15px; font-weight:700; color: rgba(255, 225, 150, 0.85); letter-spacing:0.2em; display:block; text-shadow: 0 0 15px rgba(212,164,58,0.4); }

#parchment-continue {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:10; font-family: var(--font-sans); font-size:9px; letter-spacing:0.6em;
  color: rgba(212, 164, 58, 0); text-transform:uppercase; white-space:nowrap;
  cursor:pointer; padding:10px 32px; border-radius:3px;
  border: 1px solid rgba(212, 164, 58, 0);
  background: rgba(15, 10, 5, 0);
  transition: all 1.5s ease;
}
#parchment-continue.show {
  color: rgba(212, 164, 58, 0.75); border-color: rgba(212, 164, 58, 0.35);
  background: rgba(212, 164, 58, 0.08);
  animation: cont-pulse 3s infinite;
}
@keyframes cont-pulse { 0%, 100% { opacity:0.6; } 50% { opacity:1; } }
.map-memory-shard {
  position:absolute; z-index:9; font-family: var(--font-serif); font-size:9px;
  color: rgba(212, 164, 58, 0.55); font-style:italic; pointer-events:none;
  animation: shard-hover 4s ease-in-out infinite;
  text-shadow: 0 0 8px rgba(212,164,58,0.3);
}
@keyframes shard-hover {
  0%, 100% { transform: translateY(0); opacity:0.4; }
  50% { transform: translateY(-6px); opacity:0.8; }
}
</style>
</head>

<script>
/* ─── 스탯 초기값 선언 ─── */
let 온기 = 100, 불씨 = 50, 균열 = 0;
let S3B = false; // 상인과의 비밀 거래 진행 플래그
let snowDensity = 120; // 눈송이 밀도 (온기에 의해 변함)
let currentScene = '';
let tigerInterval = null;

/* 화자별 기호/심볼 및 이름 맵핑 */
const SPEAKERS_INFO = {
  '윤': { symbol: 'Y', class: 'avatar-윤' },
  '새벽': { symbol: 'S', class: 'avatar-새벽' },
  '어머니': { symbol: 'M', class: 'avatar-어머니' },
  '어머니 (녹음기)': { symbol: 'M', class: 'avatar-어머니' },
  '어머니의 형상': { symbol: 'F', class: 'avatar-형상' },
  '설호': { symbol: 'T', class: 'avatar-설호' },
  '설호 (문 너머)': { symbol: 'T', class: 'avatar-설호' },
  '상인': { symbol: 'B', class: 'avatar-상인' }
};

/* ─── 스탯 갱신 및 비주얼 연동 ─── */
function addStat(n, v){
  if(n === '온기') 온기 = cl(온기 + v);
  else if(n === '불씨') 불씨 = cl(불씨 + v);
  else if(n === '균열') 균열 = cl(균열 + v);
  refreshStats(n);
}

function cl(v){ return Math.max(0, Math.min(100, v)); }

function refreshStats(changed){
  document.getElementById('sb-온기').style.width = 온기 + '%';
  document.getElementById('sb-불씨').style.width = 불씨 + '%';
  document.getElementById('sb-균열').style.width = 균열 + '%';

  document.getElementById('hv-온기').textContent = 온기;
  document.getElementById('hv-불씨').textContent = 불씨;
  document.getElementById('hv-균열').textContent = 균열;

  /* 수치가 변동될 때 스탯 칩이 반짝이며 맥동하는 효과 */
  if(changed){
    const chipMap = {'온기': 'chip-온기', '불씨': 'chip-불씨', '균열': 'chip-균열'};
    const chipId = chipMap[changed];
    if(chipId){
      const chip = document.getElementById(chipId);
      if(chip){
        chip.classList.remove('pulse');
        void chip.offsetWidth; // Reflow 트리거
        chip.classList.add('pulse');
        setTimeout(() => chip.classList.remove('pulse'), 600);
      }
    }
  }

  updateCrack();
  updateWarmth();
  
  /* 온기가 낮을수록 숲의 가혹함(눈보라 강도)이 강해집니다 */
  snowDensity = Math.max(30, 200 - Math.floor(온기 * 1.5));

  /* 기억 조각 수집 개수 계산 (방문한 고유 노드 개수 기반) */
  if (typeof window.getCollectedMemoryCount === 'function') {
    const memCount = window.getCollectedMemoryCount();
    document.getElementById('hud-mem-val').textContent = `기억의 조각 ${memCount}/6`;
  }
}

/* 온기 상태에 따른 화면 색상 및 연무 이펙트 변화 */
function updateWarmth(){
  const ratio = 온기 / 100;
  const ww = document.getElementById('world-warmth');
  const wg = document.getElementById('warmth-glow');
  if(온기 > 75){
    ww.style.background = `radial-gradient(ellipse 70% 50% at 50% 100%, rgba(220, 90, 20, ${(ratio - 0.7) * 0.18}) 0%, transparent 70%)`;
    ww.style.opacity = '1';
    wg.style.background = `radial-gradient(ellipse 60% 40% at 50% 110%, rgba(230, 110, 30, ${(ratio - 0.7) * 0.28}), transparent)`;
  } else if(온기 < 35){
    const coldRatio = (35 - 온기) / 35;
    ww.style.background = `radial-gradient(ellipse 80% 60% at 50% 50%, rgba(20, 50, 120, ${coldRatio * 0.25}) 0%, transparent 80%)`;
    ww.style.opacity = '1';
    wg.style.background = 'none';
  } else {
    ww.style.opacity = '0.2';
    wg.style.background = 'none';
  }
}

/* 균열(상실 및 동결의 고통) 상태에 따른 화면 흔들림 및 깨짐 쉐이딩 변화 */
function updateCrack(){
  const t = 균열 / 100;
  const cv = document.getElementById('crack-vfx');
  cv.style.opacity = t * 0.85;
  cv.style.boxShadow = `inset 0 0 ${150 * t}px rgba(160, 20, 20, ${t * 0.65}), inset 0 0 ${60 * t}px rgba(220, 30, 30, ${t * 0.35})`;
  
  if(t > 0.6){
    const shift = Math.floor((t - 0.6) * 12);
    document.getElementById('script-area').style.filter = `drop-shadow(${shift}px 0 0 rgba(200,10,10,0.25)) drop-shadow(-${shift}px 0 0 rgba(0,40,200,0.15))`;
  } else {
    document.getElementById('script-area').style.filter = 'none';
  }
}

/* ─── 엔딩 판정 로직 ─── */
function getEnding(){
  if(균열 >= 100) return 'GAMEOVER';
  const s = 온기 * 불씨;
  if(s >= 10000) return 'E3'; // 온기와 불씨가 모두 풍요로울 때 해피엔딩
  if(s >= 7000) return 'E1'; // 한쪽이라도 온전할 때 굿엔딩
  return 'E2'; // 노멀엔딩
}

/* ══════════════════════════════════
   SCENE VISUAL (좌측 영상 캔버스 렌더링)
   - 이미지를 비워두는 대신 동적 파티클 및 심장박동식 조명을 배치
   ══════════════════════════════════ */
const SCENE_ART = {
  S0: drawS0, S1: drawS1, S2: drawS2, S3: drawS3,
  S4: drawS4, S4_1: drawS41, S5: drawS5, S6: drawS6,
};

function clearArt(){
  const cv = document.getElementById('scene-art');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
}

function sizeArt(){
  const cv = document.getElementById('scene-art');
  const s = document.getElementById('stage');
  cv.width = s.offsetWidth;
  cv.height = s.offsetHeight;
}

/* S0: 고풍스러운 지하실의 은은한 난롯불 */
function drawS0(){
  sizeArt();
  const cv = document.getElementById('scene-art');
  const c = cv.getContext('2d');
  c.clearRect(0, 0, cv.width, cv.height);
}

function drawEmberFlame(c, x, y, sz, intensity){
  const ratio = intensity / 100;
  const pulse = (Math.sin(performance.now() * 0.005) + 1) / 2;

  // 아늑한 잔광
  const g = c.createRadialGradient(x, y, 0, x, y, sz * (2.0 + pulse * 0.5));
  g.addColorStop(0, `rgba(230, 100, 30, ${0.22 * ratio})`);
  g.addColorStop(0.5, `rgba(160, 50, 10, ${0.1 * ratio})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = g;
  c.fillRect(0, 0, c.canvas.width, c.canvas.height);

  // 불꽃 다층 렌더링
  const flameLayers = [
    { dx: 0, dy: 0, h: sz * 0.9, op: 0.9 },
    { dx: -sz * 0.12, dy: sz * 0.08, h: sz * 0.7, op: 0.6 },
    { dx: sz * 0.12, dy: sz * 0.06, h: sz * 0.65, op: 0.5 }
  ];

  flameLayers.forEach(f => {
    const fx = x + f.dx;
    const fy = y - f.h * 0.2 + f.dy + Math.sin(performance.now() * 0.01) * 3;
    const fg = c.createRadialGradient(fx, fy + f.h * 0.2, 0, fx, fy, f.h);
    fg.addColorStop(0, `rgba(255, 230, 140, ${f.op * ratio})`);
    fg.addColorStop(0.4, `rgba(240, 120, 30, ${f.op * 0.7 * ratio})`);
    fg.addColorStop(0.8, `rgba(180, 40, 10, ${f.op * 0.2 * ratio})`);
    fg.addColorStop(1, 'rgba(0,0,0,0)');

    c.beginPath();
    c.moveTo(fx, fy + f.h * 0.4);
    c.bezierCurveTo(fx - sz * 0.2, fy + f.h * 0.1, fx - sz * 0.1, fy - f.h * 0.2, fx, fy - f.h * 0.4);
    c.bezierCurveTo(fx + sz * 0.1, fy - f.h * 0.2, fx + sz * 0.2, fy + f.h * 0.1, fx, fy + f.h * 0.4);
    c.fillStyle = fg;
    c.fill();
  });
}

/* S1: 대피소의 굳게 닫힌 서리 낀 문 */
function drawS1(){

/* ─── 호랑이 눈 접근 연동 ─── */
let tigerActive = false;
let tigerPhase = 0;

function startTiger(){
  if(tigerActive) return;
  tigerActive = true;
  tigerPhase = 0;
  
  const eyes = document.getElementById('tiger-eyes');
  const wrap = document.getElementById('tiger-wrap');
  eyes.style.display = 'flex';
  eyes.style.justifyContent = 'center';
  eyes.style.alignItems = 'center';
  
  wrap.style.transform = 'translateY(20px) scale(0.2)';
  wrap.style.opacity = '0';

  setTimeout(() => {
    wrap.style.transition = 'transform 8s ease-in, opacity 2s ease';
    wrap.style.opacity = '0.35';
  }, 200);

  setTimeout(() => {
    wrap.style.transform = 'translateY(-10px) scale(0.7)';
    wrap.style.opacity = '0.65';
  }, 600);

  tigerInterval = setInterval(() => {
    tigerPhase++;
    if(tigerPhase === 2){
      wrap.style.transform = 'translateY(-20px) scale(1.2)';
      wrap.style.opacity = '0.9';
    }
    if(tigerPhase >= 4){
      clearInterval(tigerInterval);
      tigerInterval = null;
    }
  }, 4000);
}

function stopTiger(){
  tigerActive = false;
  if(tigerInterval){
    clearInterval(tigerInterval);
    tigerInterval = null;
  }
  document.getElementById('tiger-eyes').style.display = 'none';
}

/* ─── 렌더 시스템 ─── */
function render(key){
  const sc = SC[key];
  if(!sc){ console.error('Scene Not Found:', key); return; }
  currentScene = key;
  if(sc.end){ showEnding(sc); return; }

  stopTiger();

  // 씬 전환이 '다음으로' 형식의 단일 카드일 경우, 유연하게 병합 출력
  if(sc.choices.length === 1 && sc.choices[0].isNext){
    const nxtKey = typeof sc.choices[0].nxt === 'function' ? sc.choices[0].nxt() : sc.choices[0].nxt;
    const nxt = SC[nxtKey];
    if(nxt && !nxt.end){
      const mergedHtml = (typeof sc.html === 'function' ? sc.html() : sc.html)
        + '<div style="height:1px; background:rgba(160, 220, 255, 0.08); margin:16px 0;"></div>'
        + (typeof nxt.html === 'function' ? nxt.html() : nxt.html);
      _renderScene({ ...nxt, html: mergedHtml });
      return;
    }
    if(nxt && nxt.end){ showEnding(nxt); return; }
  }
  
  _renderScene(sc);

  /* 프롤로그(S0) 버튼 클릭으로 다음 씬 진행 */
  if(sc.prologue){
    let beat = 0;
    const hb = setInterval(() => {
      beat++;
      const valEl = document.getElementById('hv-불씨');
      if(valEl){
        valEl.style.transform = beat % 2 === 0 ? 'scale(1.25)' : 'scale(1)';
        valEl.style.color = beat % 2 === 0 ? 'var(--gold-core)' : '#fff';
      }
    }, 900);

    const s0btn = document.getElementById('s0-next-btn');
    if(s0btn){
      s0btn.addEventListener('mouseenter', ()=>{
        s0btn.style.color='rgba(255,230,150,1)';
        s0btn.style.borderColor='rgba(212,164,58,0.7)';
        s0btn.style.boxShadow='0 0 35px rgba(212,164,58,0.25), inset 0 0 12px rgba(212,164,58,0.08)';
      });
      s0btn.addEventListener('mouseleave', ()=>{
        s0btn.style.color='rgba(240,210,130,0.85)';
        s0btn.style.borderColor='rgba(212,164,58,0.35)';
        s0btn.style.boxShadow='0 0 20px rgba(212,164,58,0.08)';
      });
      s0btn.addEventListener('click', ()=>{
        clearInterval(hb);
        const valEl = document.getElementById('hv-불씨');
        if(valEl){ valEl.style.transform = ''; valEl.style.color = ''; }
        startEmberOverlayRitual(() => { go({ nxt: 'S1' }); });
      });
    }
  }
}

function _renderScene(sc){
  document.getElementById('hud-sid').textContent = sc.sid;
  document.getElementById('hud-snm').textContent = sc.nm;
  document.getElementById('pc-sid').textContent = sc.sid;
  document.getElementById('pc-snm').textContent = sc.nm;
  document.getElementById('stage-bg').className = sc.bg || 'sbg-S0';

  /* 씬별 영상 표시/숨김 */
  const videoMap = {
    'S0':'s0-video','S1':'s1-video','S2':'s2-video',
    'S3':'s3-video','S4':'s4-video','S4.1':'s41-video',
    'S5':'s5-video','S6':'s6-video'
  };
  Object.entries(videoMap).forEach(([sid, vid]) => {
    const el = document.getElementById(vid);
    if(!el) return;
    if(sc.sid === sid){
      el.style.opacity = '1';
      el.play().catch(()=>{});
    } else {
      el.style.opacity = '0';
      el.pause();
    }
  });

  const bg = sc.bg || 'sbg-S0';
  const palMap = {
    'sbg-S0': 'pal-winter', 'sbg-S1': 'pal-winter', 'sbg-S2': 'pal-winter',
    'sbg-S3': 'pal-ember', 'sbg-S4': 'pal-false', 'sbg-S41': 'pal-false',
    'sbg-S5': 'pal-tower', 'sbg-S6': 'pal-dawn'
  };
  document.body.className = palMap[bg] || 'pal-winter';

  /* 씬 변화에 맞추어 하단 지도 동기화 — sc.sid 기준으로 호출 */
  if(typeof window.mapVisitScene === 'function'){
    window.mapVisitScene(sc.sid);
  }

  // 씬 아트 드로잉
  const artFn = SCENE_ART[sc.art || sc.sid];
  if(artFn) setTimeout(artFn, 200); else clearArt();

  if(sc.tiger) startTiger();

  // 가독성을 극대화한 페이드인 연출로 스크립트 출력
  const sa = document.getElementById('script-area');
  sa.innerHTML = `<div class="scene-appear">${typeof sc.html === 'function' ? sc.html() : sc.html}</div>`;
  sa.scrollTop = 0;

  // 아바타 원형 프레임 내부에 심볼 캐릭터 로딩
  const avatars = sa.querySelectorAll('.char-avatar-container');
  avatars.forEach(av => {
    const spkName = av.parentElement.querySelector('.spk').textContent.trim();
    const cleanSpk = spkName.split(' ')[0]; // 화자 이름 추출
    const info = SPEAKERS_INFO[cleanSpk] || SPEAKERS_INFO[spkName];
    if(info){
      av.className = `char-avatar-container ${info.class}`;
      av.querySelector('.char-avatar-symbol').textContent = info.symbol;
    }
  });

  // 선택지 칩 생성
  const ca = document.getElementById('choice-area');
  ca.innerHTML = '';
  sc.choices.forEach(ch => {
    if(ch.isNext){
      const b = document.createElement('button');
      b.className = 'next-btn';
      b.textContent = ch.lbl || '여정을 계속 전진하다 →';
      b.onclick = () => go(ch);
      ca.appendChild(b);
    } else {
      const d = document.createElement('div');
      d.className = 'choice-card';
      if(ch.key){
        const k = document.createElement('div');
        k.className = 'cc-key';
        k.textContent = `파편 기록 [ ${ch.key} ]`;
        d.appendChild(k);
      }
      const l = document.createElement('div');
      l.className = 'cc-label';
      l.textContent = ch.lbl;
      d.appendChild(l);

      if(ch.effs && ch.effs.length){
        const ef = document.createElement('div');
        ef.className = 'cc-effs';
        ch.effs.forEach(([stat, val, dir]) => {
          const t = document.createElement('span');
          t.className = `eff eff-${stat}-${dir}`;
          const ico = { '온기': '🌡 ', '불씨': '✨ ', '균열': '❄ ' };
          t.textContent = `${ico[stat] || ''}${stat} ${val}`;
          ef.appendChild(t);
        });
        d.appendChild(ef);
      }
      d.onclick = () => go(ch);
      ca.appendChild(d);
    }
  });
}

function go(ch){
  if(ch.stats) ch.stats.forEach(([n, v]) => addStat(n, v));
  if(ch.s3b !== undefined) S3B = ch.s3b;
  const nk = typeof ch.nxt === 'function' ? ch.nxt() : ch.nxt;
  fadeSceneTransition(nk);
}

function fadeSceneTransition(key){
  const f = document.getElementById('fade-layer');
  f.classList.add('on');
  setTimeout(() => {
    render(key);
    setTimeout(() => f.classList.remove('on'), 300);
  }, 600);
}

/* ─── 엔딩 렌더링 ─── */
function showEnding(sc){
  document.getElementById('game-wrap').style.display = 'none';
  const es = document.getElementById('ending-screen');
  document.getElementById('e-badge').textContent = sc.badge;
  document.getElementById('e-badge').className = 'e-badge b-' + sc.type;
  document.getElementById('e-title').textContent = sc.title;
  document.getElementById('e-text').innerHTML = sc.text.replace(/\n/g, '<br>');
  es.classList.add('on');

  /* 텍스트 박스 처음엔 숨김 → 10초 후 페이드인 */
  const inner = es.querySelector('.e-inner');
  inner.style.opacity = '0';
  inner.style.transition = 'opacity 1.5s ease';
  setTimeout(() => { inner.style.opacity = '1'; }, 10000);

  /* 엔딩 영상 표시 */
  const endVideoMap = {
    'true': 'end-true-video',
    'good': 'end-good-video',
    'normal': 'end-normal-video',
    'bad': 'end-bad-video'
  };
  ['end-true-video','end-good-video','end-normal-video','end-bad-video'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    const isActive = endVideoMap[sc.type] === id;
    el.style.opacity = isActive ? '1' : '0';
    if(isActive) el.play().catch(()=>{});
    else el.pause();
  });

  /* 캔버스는 투명하게 비움 */
  const cv = document.getElementById('ending-canvas');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
}

/* ─── 시작 / 재시작 제어 ─── */
/* ══════════════════════════════════════════════════
   OPENING SEQUENCE  —  판타지 영화 오프닝 연출
   1) 타이틀 암전  2) 세계관 내레이션 스크롤

   ══════════════════════════════════════════════════ */
(function(){

  /* ── 세계관 문장 목록 ── */
  const LINES = [
    '오래전, 세상에는 겨울이 없었다.',

    '태양은 잠들었고,',
    '세상은 끝나지 않는 겨울 속으로 가라앉았다.',
    '',
    '사람들은 말했다.',
    '세상 끝, 구름 위에',
    '모든 빛의 근원인 『빛의 탑』이 존재한다고.',
    '',
    '그리고 온기를 잃은 사람을 쫓는 존재가 태어났다.',
    '사람들은 그것을 『설호』라고 불렀다.',
  ];

  /* ── 불씨 캔버스 ── */
  let emberRAF;
  function startEmberAnim(){
    const cv = document.getElementById('ember-cv');
    if(!cv) return;
    const ctx = cv.getContext('2d');
    let t = 0;
    function draw(){
      t += 0.04;
      const w = cv.width, h = cv.height, cx = w/2, cy = h/2;
      ctx.clearRect(0,0,w,h);
      const pulse = 0.85 + Math.sin(t*1.1)*0.15 + Math.sin(t*2.3)*0.05;
      const flicker = 1 + Math.sin(t*4.7)*0.04 + Math.sin(t*7.3)*0.02;
      // 외부 아우라
      const aura = ctx.createRadialGradient(cx,cy,0, cx,cy, 44*pulse);
      aura.addColorStop(0, `rgba(255,220,100,${0.06*flicker})`);
      aura.addColorStop(0.5, `rgba(212,140,30,0.03)`);
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = aura;
      ctx.beginPath(); ctx.arc(cx,cy,44*pulse,0,Math.PI*2); ctx.fill();
      // 중간 광환
      const mid = ctx.createRadialGradient(cx,cy,0, cx,cy, 22*pulse);
      mid.addColorStop(0, `rgba(255,240,160,${0.55*flicker})`);
      mid.addColorStop(0.5, `rgba(220,150,40,${0.28*flicker})`);
      mid.addColorStop(1, 'rgba(180,80,0,0)');
      ctx.fillStyle = mid;
      ctx.beginPath(); ctx.arc(cx,cy,22*pulse,0,Math.PI*2); ctx.fill();
      // 코어
      const core = ctx.createRadialGradient(cx,cy,0, cx,cy, 7*pulse);
      core.addColorStop(0, `rgba(255,255,220,${0.98*flicker})`);
      core.addColorStop(0.5, `rgba(255,210,80,0.9)`);
      core.addColorStop(1, 'rgba(220,120,20,0)');
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(cx,cy,7*pulse,0,Math.PI*2); ctx.fill();
      emberRAF = requestAnimationFrame(draw);
    }
    draw();
  }

  /* ── 배경 캔버스 (눈 + 탑 실루엣) ── */
  let bgRAF;
  function startBgAnim(){
    const cv = document.getElementById('opening-canvas');
    if(!cv) return;
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    window.addEventListener('resize', ()=>{ cv.width=window.innerWidth; cv.height=window.innerHeight; });
    const ctx = cv.getContext('2d');
    const flakes = Array.from({length:90}, ()=>({
      x: Math.random(), y: Math.random(),
      vy: Math.random()*0.0006+0.0002,
      vx: Math.random()*0.0003,
      r: Math.random()*1.4+0.3,
      o: Math.random()*0.18+0.03
    }));
    let t=0, towerAlpha=0, towerDir=1;
    function draw(){
      t+=0.012;
      const w=cv.width, h=cv.height;
      ctx.clearRect(0,0,w,h);
      // 밤하늘
      const bg=ctx.createLinearGradient(0,0,0,h);
      bg.addColorStop(0,'#000000'); bg.addColorStop(1,'#01020a');
      ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
      // 탑 실루엣 — 희미하게 등장했다 사라짐
      towerAlpha += towerDir * 0.003;
      if(towerAlpha>0.12) towerDir=-1;
      if(towerAlpha<0) { towerAlpha=0; towerDir=1; }
      const tw=w*0.04, tx=(w-tw)/2;
      ctx.globalAlpha = towerAlpha;
      const tg=ctx.createLinearGradient(0,0,0,h*0.6);
      tg.addColorStop(0,'rgba(200,180,100,0.6)'); tg.addColorStop(1,'rgba(10,8,2,0)');
      ctx.fillStyle=tg; ctx.fillRect(tx, h*0.1, tw, h*0.55);
      // 탑 꼭대기 빛
      const topGlow=ctx.createRadialGradient(w/2,h*0.1,0, w/2,h*0.1,w*0.18);
      topGlow.addColorStop(0,'rgba(220,170,60,0.18)'); topGlow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=topGlow; ctx.fillRect(0,0,w,h*0.4);
      ctx.globalAlpha=1;
      // 눈
      flakes.forEach(f=>{
        f.y+=f.vy; f.x+=f.vx+Math.sin(t*0.4)*0.0001;
        if(f.y>1){f.y=-0.01;f.x=Math.random();}
        ctx.beginPath(); ctx.arc(f.x*w,f.y*h,f.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(210,230,255,${f.o})`; ctx.fill();
      });
      bgRAF=requestAnimationFrame(draw);
    }
    draw();
  }

  /* ── 불씨 파티클 (버튼 주변) ── */
  let partRAF;
  function startParticles(){
    const cv = document.getElementById('particle-cv');
    if(!cv) return;
    const ctx = cv.getContext('2d');
    const W=cv.width, H=cv.height;
    const pts = Array.from({length:18}, ()=>({
      x: W/2+(Math.random()-0.5)*260,
      y: H/2+(Math.random()-0.5)*60,
      vx:(Math.random()-0.5)*0.3,
      vy:-(Math.random()*0.4+0.1),
      r:Math.random()*2+0.5,
      o:Math.random()*0.6+0.2,
      life:Math.random()
    }));
    function draw(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{
        p.life+=0.005; if(p.life>1){p.life=0;p.x=W/2+(Math.random()-0.5)*260;p.y=H/2+(Math.random()-0.5)*30;}
        p.x+=p.vx; p.y+=p.vy*0.5;
        const alpha = p.o * Math.sin(p.life*Math.PI);
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,200,80,${alpha})`; ctx.fill();
      });
      partRAF=requestAnimationFrame(draw);
    }
    draw();
  }

  /* ── 문장 순차 표시 ── */
  function runTextSequence(onComplete){
    const wrap = document.getElementById('opening-text-wrap');
    const inner = document.getElementById('opening-text-inner');
    if(!wrap||!inner) return;

    // 전체 텍스트를 span으로 나눠 한 줄씩 페이드
    inner.innerHTML = '';
    const spans = LINES.map(line=>{
      const s = document.createElement('div');
      s.style.cssText = 'opacity:0;transition:opacity 1.2s ease;min-height:1.2em;';
      s.textContent = line || '\u00A0';
      inner.appendChild(s);
      return s;
    });

    // inner를 화면 중앙 아래에 시작, 위로 이동
    inner.style.top = '55%';
    inner.style.transform = 'translateY(0)';
    inner.style.transition = 'none';
    wrap.style.opacity = '1';

    let idx = 0;
    const SHOW_DELAY   = 1800;  // 문장 간격 (ms)
    const SCROLL_SPEED = 42;    // px per step

    // 조금씩 위로 스크롤하면서 문장 표시
    let scrollY = 0;
    const scrollInt = setInterval(()=>{
      scrollY += 0.45;
      inner.style.transform = `translateY(-${scrollY}px)`;
    }, 16);

    function showNext(){
      if(idx >= spans.length){ 
        clearInterval(scrollInt);
        // 마지막 문장이 사라질 시간 후 완료
        setTimeout(()=>{
          wrap.style.transition='opacity 1.5s ease';
          wrap.style.opacity='0';
          setTimeout(onComplete, 1600);
        }, 2200);
        return;
      }
      spans[idx].style.opacity='1';
      idx++;
      setTimeout(showNext, SHOW_DELAY);
    }
    setTimeout(showNext, 600);
  }

  /* ── 4단계: 불씨 폭발 → S0 시작 ── */
  function emberExplosionAndStart(){
    const seq = document.getElementById('opening-seq');
    const fl = document.getElementById('fade-layer');

    const emberDiv = document.getElementById('opening-ember');

    emberDiv.style.transform = 'translate(-50%,-50%) scale(30)';
    emberDiv.style.opacity = '0';
    // 화면 황금빛 플래시
    const flash = document.createElement('div');

    document.body.appendChild(flash);
    setTimeout(()=>{ flash.style.background='rgba(212,164,58,0.55)'; },50);
    setTimeout(()=>{ flash.style.opacity='0'; },900);
    // fade-layer로 검게
    setTimeout(()=>{
      fl.classList.add('on');

    setTimeout(()=>{
      cancelAnimationFrame(emberRAF);

      if(typeof window.mapInit==='function') window.mapInit();
      render('S0');
      setTimeout(()=>fl.classList.remove('on'),400);
      flash.remove();
    }, 2000);
  }

  /* ── 메인 진입: 타이틀 버튼 클릭 ── */
  window.startGame = function(){
    const titleScreen = document.getElementById('title-screen');
    const seq = document.getElementById('opening-seq');

    // 버튼 클릭 순간 모든 영상 소리 ON (Chrome autoplay 정책: 클릭 후에만 가능)

    // 2단계: 잠시 후 불씨만 보이다가 텍스트 시작

        // 3단계: 버튼 등장

        btnWrap.style.opacity='1';

  /* ── 버튼 hover 효과 ── */
